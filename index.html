<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wase Bet - ሁሉም ጨዋታዎች</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0f1a 0%, #0a0a0c 100%);
            color: white;
            padding-bottom: 80px;
        }
        .top-bar {
            background: #121316;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2c34;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #ff9800);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .balance-wrap {
            background: #1a1c22;
            padding: 6px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .balance-amount {
            font-weight: bold;
            font-size: 1.1rem;
            color: #00ffcc;
        }
        .bet-panel {
            background: #121316;
            margin: 16px;
            padding: 12px 16px;
            border-radius: 20px;
        }
        .bet-quick {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .bet-quick button {
            background: #1f2128;
            border: none;
            color: #ffcc00;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }
        .bet-input {
            background: #1a1c22;
            border: 1px solid #2a2c34;
            color: #ffcc00;
            padding: 8px 14px;
            border-radius: 30px;
            width: 100px;
            text-align: center;
        }
        .section-title {
            padding: 0 16px;
            margin: 20px 0 12px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffcc00;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 16px;
        }
        @media (max-width: 550px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .game-card {
            background: #121316;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2a2c34;
        }
        .game-card:hover {
            transform: translateY(-3px);
            border-color: #ffcc00;
        }
        .game-thumb {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: #1a1c22;
        }
        .game-info {
            padding: 8px;
            text-align: center;
        }
        .game-name {
            font-size: 12px;
            font-weight: 600;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #121316;
            border-top: 1px solid #2a2c34;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 20;
        }
        .nav-item {
            text-align: center;
            color: #aaa;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }
        .game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,10,15,0.98);
            z-index: 200;
            overflow-y: auto;
            padding: 20px;
        }
        .overlay-card {
            background: #121316;
            border-radius: 28px;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .back-btn {
            background: #1f2128;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
            color: #ffcc00;
        }
        .action-btn {
            background: #ffcc00;
            border: none;
            width: 100%;
            padding: 14px;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 15px;
            cursor: pointer;
            color: black;
        }
        .multiplier {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff3366;
            text-align: center;
            margin: 20px 0;
        }
        .lottery-nums {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .lottery-num {
            background: #1f2128;
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">⚡ WASE BET</div>
    <div class="balance-wrap">
        <span>💰 ቀሪ</span>
        <span class="balance-amount" id="globalBalance">150.00</span>
    </div>
</div>

<div class="bet-panel">
    <div class="bet-quick">
        <button onclick="setBet(5)">5</button>
        <button onclick="setBet(10)">10</button>
        <button onclick="setBet(20)">20</button>
        <button onclick="setBet(50)">50</button>
        <button onclick="setBet(100)">100</button>
        <input type="number" id="customBet" class="bet-input" value="10" min="5" max="500">
    </div>
</div>

<div class="section-title">🎮 ሁሉም ጨዋታዎች</div>
<div id="gameGrid" class="games-grid"></div>

<div class="bottom-nav">
    <div class="nav-item" onclick="location.reload()"><div class="nav-icon">🎮</div><div>Games</div></div>
    <div class="nav-item" onclick="handleAction('deposit')"><div class="nav-icon">📥</div><div>Deposit</div></div>
    <div class="nav-item" onclick="handleAction('withdraw')"><div class="nav-icon">💸</div><div>Withdraw</div></div>
    <div class="nav-item" onclick="window.open('https://t.me/Wase_Bet', '_blank')"><div class="nav-icon">👥</div><div>Group</div></div>
    <div class="nav-item" onclick="window.open('https://t.me/WaseBet12', '_blank')"><div class="nav-icon">☎️</div><div>Support</div></div>
</div>

<div id="gameOverlay" class="game-overlay">
    <div class="overlay-card">
        <div class="back-btn" onclick="closeGame()">⬅ ወደ ጨዋታ ዝርዝር</div>
        <div id="gameContent"></div>
    </div>
</div>

<script>
    // ጨዋታዎች
    const games = [
        "🎰 Lottery", "✈️ Aviator", "🐔 Chicken Road", "🎡 Wheel",
        "💣 Mines", "🎲 Dice", "🎯 Plinko", "🐇 Rabbit Road",
        "🐟 Fish Road", "🏏 Cricket Road", "🧱 Mega Block", "🔥 Crash"
    ];

    let userBalance = 150;
    const balanceSpan = document.getElementById('globalBalance');
    const betInput = document.getElementById('customBet');

    function updateBalance() {
        balanceSpan.innerText = userBalance.toFixed(2);
        localStorage.setItem('balance', userBalance);
    }

    function loadBalance() {
        let saved = localStorage.getItem('balance');
        if (saved) userBalance = parseFloat(saved);
        updateBalance();
    }

    function getBet() {
        let val = parseFloat(betInput.value);
        if (isNaN(val) || val < 5) return 10;
        if (val > 500) return 500;
        return val;
    }

    function setBet(amount) {
        betInput.value = amount;
    }

    function deductBet(amount) {
        if (userBalance < amount) {
            alert("❌ በቂ ነጥብ የለም!");
            return false;
        }
        userBalance -= amount;
        updateBalance();
        return true;
    }

    function addWin(amount) {
        userBalance += amount;
        updateBalance();
    }

    function handleAction(type) {
        if (type === 'deposit') {
            alert("📥 ቴሌብር: 0974107425 (Mulualem)\n💵 ዝቅተኛ: 100 ETB");
        } else {
            alert("💸 መውጫ 500 ETB ነው። አስተዳዳሪ @WaseBet12 ያነጋግሩ");
        }
    }

    // የሎተሪ ጨዋታ
    function showLottery() {
        let content = `
            <h2>🎰 ሎተሪ</h2>
            <p>ከ1-10 ቁጥር ምረጥ (ውርርድ: ${getBet()} ETB, 7x)</p>
            <div class="lottery-nums" id="lotteryNums"></div>
            <div id="lotteryResult"></div>
        `;
        document.getElementById('gameContent').innerHTML = content;
        let container = document.getElementById('lotteryNums');
        for (let i = 1; i <= 10; i++) {
            let btn = document.createElement('div');
            btn.className = 'lottery-num';
            btn.innerText = i;
            btn.onclick = () => playLottery(i);
            container.appendChild(btn);
        }
    }

    function playLottery(num) {
        let bet = getBet();
        if (!deductBet(bet)) return;
        let winning = Math.floor(Math.random() * 10) + 1;
        if (num === winning) {
            let win = bet * 7;
            addWin(win);
            document.getElementById('lotteryResult').innerHTML = `<p style="color:#00ffcc">🎉 አሸነፍክ! ቁጥር: ${winning} | አሸነፍከው: ${win} ETB</p>`;
        } else {
            document.getElementById('lotteryResult').innerHTML = `<p style="color:#ff6666">😢 አልሸነፍክም! አሸናፊ ቁጥር: ${winning}</p>`;
        }
        setTimeout(() => closeGame(), 2000);
    }

    // አቪዬተር ጨዋታ
    let aviInterval, aviActive, aviMulti, aviBet;
    function showAviator() {
        document.getElementById('gameContent').innerHTML = `
            <h2>✈️ አቪዬተር</h2>
            <div class="multiplier" id="aviMulti">1.00x</div>
            <button id="aviBtn" class="action-btn">🚀 SPIN</button>
            <div id="aviStatus"></div>
        `;
        let btn = document.getElementById('aviBtn');
        aviActive = false;
        btn.onclick = () => {
            if (!aviActive) {
                let bet = getBet();
                if (!deductBet(bet)) return;
                aviBet = bet;
                aviActive = true;
                aviMulti = 1;
                document.getElementById('aviMulti').innerText = "1.00x";
                btn.innerText = "🛬 ካሽ አውት";
                if (aviInterval) clearInterval(aviInterval);
                aviInterval = setInterval(() => {
                    if (aviActive) {
                        aviMulti += 0.05;
                        document.getElementById('aviMulti').innerText = aviMulti.toFixed(2) + "x";
                        if (Math.random() < 0.08 && aviMulti > 1.2) {
                            clearInterval(aviInterval);
                            document.getElementById('aviStatus').innerHTML = "💥 ወደቀ! አጣህ " + aviBet + " ETB";
                            aviActive = false;
                            btn.innerText = "🚀 SPIN";
                        }
                    }
                }, 80);
            } else {
                clearInterval(aviInterval);
                let win = Math.floor(aviBet * aviMulti);
                addWin(win);
                document.getElementById('aviStatus').innerHTML = "🏆 ካሽ አውት! አሸነፍክ " + win + " ETB (" + aviMulti.toFixed(2) + "x)";
                aviActive = false;
                btn.innerText = "🚀 SPIN";
                setTimeout(() => closeGame(), 2000);
            }
        };
    }

    // ቺከን ሮድ
    let chickenInterval;
    function showChicken() {
        document.getElementById('gameContent').innerHTML = `
            <h2>🐔 ቺከን ሮድ</h2>
            <div style="position:relative; height:150px; background:#1a1c22; border-radius:16px; overflow:hidden;">
                <div id="chicken" style="position:absolute; left:20px; bottom:10px; font-size:3rem;">🐔</div>
                <div id="truck" style="position:absolute; right:-60px; bottom:10px; font-size:2.5rem;">🚚</div>
            </div>
            <button id="chickenBtn" class="action-btn">🏁 ጀምር</button>
            <div id="chickenStatus"></div>
        `;
        let btn = document.getElementById('chickenBtn');
        btn.onclick = () => {
            if (chickenInterval) return;
            let bet = getBet();
            if (!deductBet(bet)) return;
            let chicken = document.getElementById('chicken');
            let truck = document.getElementById('truck');
            let chickenX = 20, truckX = -60;
            chicken.style.left = chickenX + "px";
            truck.style.right = truckX + "px";
            chickenInterval = setInterval(() => {
                chickenX += 6;
                truckX -= 7;
                chicken.style.left = chickenX + "px";
                truck.style.right = truckX + "px";
                if (chickenX >= 280) {
                    clearInterval(chickenInterval);
                    let win = Math.floor(bet * 2);
                    addWin(win);
                    document.getElementById('chickenStatus').innerHTML = "🎉 ዶሮዋ ደረሰች! +" + win + " ETB";
                    chickenInterval = null;
                    setTimeout(() => closeGame(), 2000);
                } else if (Math.abs(chickenX - (320 + truckX)) < 40 && truckX > -20) {
                    clearInterval(chickenInterval);
                    document.getElementById('chickenStatus').innerHTML = "💥 መኪና መታች! አጣህ " + bet + " ETB";
                    chickenInterval = null;
                    setTimeout(() => closeGame(), 2000);
                }
            }, 55);
        };
    }

    // ዊል
    function showWheel() {
        document.getElementById('gameContent').innerHTML = `
            <h2>🎡 ዊል</h2>
            <div id="wheel" style="width:200px; height:200px; margin:20px auto; border-radius:50%; background:conic-gradient(red,blue,green,yellow,purple,orange,cyan,pink); transition:4s ease-out;"></div>
            <button id="wheelBtn" class="action-btn">🎲 SPIN</button>
            <div id="wheelResult"></div>
        `;
        document.getElementById('wheelBtn').onclick = () => {
            let bet = getBet();
            if (!deductBet(bet)) return;
            let wheel = document.getElementById('wheel');
            let deg = 3600 + Math.random() * 1000;
            wheel.style.transform = "rotate(" + deg + "deg)";
            setTimeout(() => {
                let stop = deg % 360;
                let mult = 1;
                if (stop < 45) mult = 2;
                else if (stop < 90) mult = 1.5;
                else if (stop < 135) mult = 0;
                else if (stop < 180) mult = 3;
                else if (stop < 225) mult = 1.2;
                else if (stop < 270) mult = 0;
                else if (stop < 315) mult = 4;
                else mult = 2.5;
                if (mult > 0) {
                    let win = Math.floor(bet * mult);
                    addWin(win);
                    document.getElementById('wheelResult').innerHTML = "🎉 " + mult + "x! አሸነፍክ " + win + " ETB";
                } else {
                    document.getElementById('wheelResult').innerHTML = "💥 ተሸነፍክ! አጣህ " + bet + " ETB";
                }
                setTimeout(() => closeGame(), 2000);
            }, 4000);
        };
    }

    // ክራሽ ጨዋታ (መደበኛ)
    let crashInterval, crashActive, crashMulti, crashBet;
    function showCrash() {
        document.getElementById('gameContent').innerHTML = `
            <h2>🔥 CRASH</h2>
            <div class="multiplier" id="crashMulti">1.00x</div>
            <button id="crashBtn" class="action-btn">🚀 SPIN</button>
            <div id="crashStatus"></div>
        `;
        let btn = document.getElementById('crashBtn');
        crashActive = false;
        btn.onclick = () => {
            if (!crashActive) {
                let bet = getBet();
                if (!deductBet(bet)) return;
                crashBet = bet;
                crashActive = true;
                crashMulti = 1;
                document.getElementById('crashMulti').innerText = "1.00x";
                btn.innerText = "🛬 ካሽ አውት";
                if (crashInterval) clearInterval(crashInterval);
                crashInterval = setInterval(() => {
                    if (crashActive) {
                        crashMulti += 0.06;
                        document.getElementById('crashMulti').innerText = crashMulti.toFixed(2) + "x";
                        if (Math.random() < 0.1 && crashMulti > 1.3) {
                            clearInterval(crashInterval);
                            document.getElementById('crashStatus').innerHTML = "💥 CRASH! አጣህ " + crashBet + " ETB";
                            crashActive = false;
                            btn.innerText = "🚀 SPIN";
                        }
                    }
                }, 85);
            } else {
                clearInterval(crashInterval);
                let win = Math.floor(crashBet * crashMulti);
                addWin(win);
                document.getElementById('crashStatus').innerHTML = "🏆 ካሽ አውት! +" + win + " ETB";
                crashActive = false;
                btn.innerText = "🚀 SPIN";
                setTimeout(() => closeGame(), 2000);
            }
        };
    }

    function showDefault(game) {
        document.getElementById('gameContent').innerHTML = `
            <h2>${game}</h2>
            <div class="multiplier" id="gameMulti">1.00x</div>
            <button id="gameBtn" class="action-btn">🚀 SPIN</button>
            <div id="gameStatus"></div>
        `;
        let btn = document.getElementById('gameBtn');
        let active = false, multi = 1, betAmt;
        btn.onclick = () => {
            if (!active) {
                let bet = getBet();
                if (!deductBet(bet)) return;
                betAmt = bet;
                active = true;
                multi = 1;
                document.getElementById('gameMulti').innerText = "1.00x";
                btn.innerText = "🛬 ካሽ አውት";
                let interval = setInterval(() => {
                    if (active) {
                        multi += 0.05;
                        document.getElementById('gameMulti').innerText = multi.toFixed(2) + "x";
                        if (Math.random() < 0.08 && multi > 1.2) {
                            clearInterval(interval);
                            document.getElementById('gameStatus').innerHTML = "💥 ወደቀ! አጣህ " + betAmt + " ETB";
                            active = false;
                            btn.innerText = "🚀 SPIN";
                        }
                    }
                }, 80);
                window.currentInterval = interval;
            } else {
                clearInterval(window.currentInterval);
                let win = Math.floor(betAmt * multi);
                addWin(win);
                document.getElementById('gameStatus').innerHTML = "🏆 ካሽ አውት! +" + win + " ETB";
                active = false;
                btn.innerText = "🚀 SPIN";
                setTimeout(() => closeGame(), 2000);
            }
        };
    }

    function openGame(gameName) {
        document.getElementById('gameOverlay').style.display = 'block';
        if (gameName === "🎰 Lottery") showLottery();
        else if (gameName === "✈️ Aviator") showAviator();
        else if (gameName === "🐔 Chicken Road") showChicken();
        else if (gameName === "🎡 Wheel") showWheel();
        else if (gameName === "🔥 Crash") showCrash();
        else showDefault(gameName);
    }

    function closeGame() {
        if (aviInterval) clearInterval(aviInterval);
        if (chickenInterval) clearInterval(chickenInterval);
        if (crashInterval) clearInterval(crashInterval);
        document.getElementById('gameOverlay').style.display = 'none';
    }

    function renderGames() {
        let container = document.getElementById('gameGrid');
        container.innerHTML = '';
        games.forEach(game => {
            let card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => openGame(game);
            card.innerHTML = `
                <div class="game-thumb">${game.split(' ')[0]}</div>
                <div class="game-info">
                    <div class="game-name">${game}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    loadBalance();
    renderGames();
</script>
</body>
</html>
