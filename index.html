<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wase Bet - Chicken Road | Aviator | Mega Block</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0a0c 0%, #121316 100%);
            color: white;
            padding-bottom: 80px;
        }
        /* Header */
        .top-bar {
            background: #0f0f12;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2c34;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #ff9800);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .balance-wrap {
            background: #1a1c22;
            padding: 5px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .balance-label {
            font-size: 0.7rem;
            color: #aaa;
        }
        .balance-amount {
            font-weight: bold;
            font-size: 1rem;
            color: #00ffcc;
        }
        /* Bet Panel */
        .bet-panel {
            background: #0f0f12;
            margin: 12px;
            padding: 12px;
            border-radius: 16px;
        }
        .bet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .bet-label {
            color: #aaa;
            font-size: 0.8rem;
        }
        .auto-badge {
            background: #2a2c34;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #ffcc00;
        }
        .bet-quick {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .bet-quick button {
            background: #1f2128;
            border: none;
            color: #ffcc00;
            padding: 6px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .bet-input {
            background: #1a1c22;
            border: 1px solid #2a2c34;
            color: #ffcc00;
            padding: 8px 12px;
            border-radius: 25px;
            width: 100px;
            text-align: center;
        }
        /* 3 Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 12px;
            margin: 20px 0;
        }
        @media (max-width: 550px) {
            .games-grid {
                gap: 8px;
            }
        }
        .game-card {
            background: linear-gradient(145deg, #121316, #0a0a0c);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2a2c34;
            text-align: center;
            padding: 15px 8px;
        }
        .game-card:hover {
            transform: translateY(-4px);
            border-color: #ffcc00;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .game-icon {
            font-size: 3rem;
            margin-bottom: 8px;
        }
        .game-name {
            font-size: 14px;
            font-weight: 700;
        }
        .game-badge {
            font-size: 10px;
            color: #ffcc00;
            margin-top: 5px;
        }
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0f0f12;
            border-top: 1px solid #2a2c34;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 20;
        }
        .nav-item {
            text-align: center;
            color: #aaa;
            font-size: 0.65rem;
            cursor: pointer;
        }
        .nav-icon {
            font-size: 1.2rem;
            margin-bottom: 3px;
        }
        /* Game Overlay */
        .game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,10,15,0.98);
            backdrop-filter: blur(8px);
            z-index: 200;
            overflow-y: auto;
            padding: 20px;
        }
        .overlay-card {
            background: #121316;
            border-radius: 28px;
            border: 1px solid #2a2c34;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }
        .back-btn {
            background: #1f2128;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
            color: #ffcc00;
            font-size: 0.9rem;
        }
        .action-btn {
            background: #ffcc00;
            border: none;
            width: 100%;
            padding: 14px;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 15px;
            cursor: pointer;
            color: black;
            font-size: 1rem;
        }
        .cashout-btn {
            background: #2e7d32;
            color: white;
        }
        .multiplier {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff3366;
            text-align: center;
            margin: 20px 0;
        }
        /* Chicken Road Animation */
        .road-container {
            position: relative;
            height: 160px;
            background: #1a1c22;
            border-radius: 20px;
            overflow: hidden;
            margin: 15px 0;
            border: 1px solid #2a2c34;
        }
        .chicken-char {
            position: absolute;
            left: 20px;
            bottom: 10px;
            font-size: 2.8rem;
            transition: left 0.05s linear;
        }
        .truck-char {
            position: absolute;
            right: -80px;
            bottom: 10px;
            font-size: 2.5rem;
            transition: right 0.05s linear;
        }
        /* Mega Block */
        .blocks-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .block-cell {
            background: #1f2128;
            aspect-ratio: 1;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .block-cell:hover {
            background: #2a2c34;
        }
        .bet-presets {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }
        .preset-btn {
            background: #1f2128;
            border: none;
            padding: 6px 14px;
            border-radius: 25px;
            color: #ffcc00;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">⚡ WASE BET</div>
    <div class="balance-wrap">
        <span class="balance-label">💰 ቀሪ</span>
        <span class="balance-amount" id="globalBalance">500.00</span>
    </div>
</div>

<div class="bet-panel">
    <div class="bet-row">
        <span class="bet-label">Bet</span>
        <span class="auto-badge">Auto</span>
    </div>
    <div class="bet-quick">
        <button onclick="setBet(4)">4</button>
        <button onclick="setBet(16)">16</button>
        <button onclick="setBet(40)">40</button>
        <button onclick="setBet(80)">80</button>
        <button onclick="setBet(400)">400</button>
    </div>
    <div class="bet-row">
        <span class="bet-label">Bet</span>
        <input type="number" id="customBet" class="bet-input" value="10" step="1" min="4" max="500">
        <span>ETB</span>
    </div>
</div>

<div class="games-grid">
    <div class="game-card" onclick="openGame('chicken')">
        <div class="game-icon">🐔</div>
        <div class="game-name">CHICKEN ROAD</div>
        <div class="game-badge">Crash Game</div>
    </div>
    <div class="game-card" onclick="openGame('aviator')">
        <div class="game-icon">✈️</div>
        <div class="game-name">AVIATOR</div>
        <div class="game-badge">Crash Game</div>
    </div>
    <div class="game-card" onclick="openGame('megablock')">
        <div class="game-icon">🧱</div>
        <div class="game-name">MEGA BLOCK</div>
        <div class="game-badge">Mystery Box</div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="location.reload()"><div class="nav-icon">🎮</div><div>Games</div></div>
    <div class="nav-item" onclick="handleAction('deposit')"><div class="nav-icon">📥</div><div>Deposit</div></div>
    <div class="nav-item" onclick="handleAction('withdraw')"><div class="nav-icon">💸</div><div>Withdraw</div></div>
    <div class="nav-item" onclick="window.open('https://t.me/Wase_Bet', '_blank')"><div class="nav-icon">👥</div><div>Group</div></div>
    <div class="nav-item" onclick="window.open('https://t.me/WaseBet12', '_blank')"><div class="nav-icon">☎️</div><div>Support</div></div>
</div>

<div id="gameOverlay" class="game-overlay">
    <div class="overlay-card">
        <div class="back-btn" onclick="closeGame()">⬅ ወደ ጨዋታ ዝርዝር</div>
        <div id="gameContent"></div>
    </div>
</div>

<script>
    // ========== Balance Management ==========
    let userBalance = 500.00;
    const balanceSpan = document.getElementById('globalBalance');
    const betInput = document.getElementById('customBet');

    function updateBalance() {
        balanceSpan.innerText = userBalance.toFixed(2);
        localStorage.setItem('balance', userBalance);
    }

    function loadBalance() {
        let saved = localStorage.getItem('balance');
        if (saved && !isNaN(parseFloat(saved))) userBalance = parseFloat(saved);
        updateBalance();
    }

    function getBet() {
        let val = parseFloat(betInput.value);
        if (isNaN(val) || val < 4) return 10;
        if (val > 500) return 500;
        return val;
    }

    function setBet(amount) {
        betInput.value = amount;
    }

    function deductBet(amount) {
        if (userBalance < amount) {
            alert("❌ በቂ ነጥብ የለም! ቀሪ: " + userBalance.toFixed(2) + " ETB");
            return false;
        }
        userBalance -= amount;
        updateBalance();
        return true;
    }

    function addWin(amount) {
        userBalance += amount;
        updateBalance();
    }

    function handleAction(type) {
        if (type === 'deposit') {
            alert("📥 ገንዘብ ለማስገባት:\n📞 ቴሌብር: 0974107425\n👤 Mulualem\n💵 ዝቅተኛ: 100 ETB");
        } else {
            alert("💸 መውጫ 500 ETB ነው። አስተዳዳሪ @WaseBet12 ያነጋግሩ");
        }
    }

    // ========== CHICKEN ROAD ==========
    let chickenInterval = null;
    function showChickenRoad() {
        document.getElementById('gameContent').innerHTML = `
            <h2 style="text-align:center;">🐔 CHICKEN ROAD</h2>
            <div class="road-container">
                <div id="chickenChar" class="chicken-char">🐔</div>
                <div id="truckChar" class="truck-char">🚚</div>
            </div>
            <div class="bet-presets">
                <button class="preset-btn" onclick="setBet(30)">30 ETB</button>
                <button class="preset-btn" onclick="setBet(50)">50 ETB</button>
                <button class="preset-btn" onclick="setBet(150)">150 ETB</button>
                <button class="preset-btn" onclick="setBet(300)">300 ETB</button>
            </div>
            <button id="chickenPlayBtn" class="action-btn">🏁 Play</button>
            <div id="chickenStatus" style="text-align:center; margin-top:15px; color:#ffaa66;"></div>
        `;
        document.getElementById('chickenPlayBtn').onclick = startChickenGame;
    }

    function startChickenGame() {
        if (chickenInterval) return;
        let bet = getBet();
        if (!deductBet(bet)) return;
        
        let chicken = document.getElementById('chickenChar');
        let truck = document.getElementById('truckChar');
        let status = document.getElementById('chickenStatus');
        
        let chickenX = 20;
        let truckX = -80;
        chicken.style.left = chickenX + "px";
        truck.style.right = truckX + "px";
        status.innerHTML = "🐔 ዶሮዋ መንገድ እያቋረጠች ነው...";
        
        chickenInterval = setInterval(() => {
            chickenX += 7;
            truckX -= 8;
            chicken.style.left = chickenX + "px";
            truck.style.right = truckX + "px";
            
            if (chickenX >= 280) {
                clearInterval(chickenInterval);
                let win = Math.floor(bet * 2.2);
                addWin(win);
                status.innerHTML = "🎉 ዶሮዋ ደህና ደረሰች! አሸነፍክ " + win + " ETB! 🎉";
                chickenInterval = null;
                setTimeout(() => closeGame(), 2500);
            } else if (Math.abs(chickenX - (340 + truckX)) < 45 && truckX > -30) {
                clearInterval(chickenInterval);
                status.innerHTML = "💥 መኪና መታች! አጣህ " + bet + " ETB! 💥";
                chickenInterval = null;
                setTimeout(() => closeGame(), 2000);
            }
        }, 55);
    }

    // ========== AVIATOR ==========
    let aviInterval = null;
    let aviActive = false;
    let aviMulti = 1;
    let aviBetAmount = 0;
    
    function showAviator() {
        document.getElementById('gameContent').innerHTML = `
            <h2 style="text-align:center;">✈️ AVIATOR</h2>
            <div style="background:#1a1c22; border-radius:16px; padding:20px; text-align:center;">
                <div style="font-size:3rem; margin-bottom:10px;">✈️</div>
                <div id="aviMulti" class="multiplier">1.00x</div>
                <button id="aviBtn" class="action-btn">🚀 SPIN</button>
                <div id="aviStatus" style="margin-top:15px; color:#ffaa66;"></div>
            </div>
        `;
        aviActive = false;
        document.getElementById('aviBtn').onclick = handleAviator;
    }
    
    function handleAviator() {
        let btn = document.getElementById('aviBtn');
        let multiSpan = document.getElementById('aviMulti');
        let statusSpan = document.getElementById('aviStatus');
        
        if (!aviActive) {
            let bet = getBet();
            if (!deductBet(bet)) return;
            aviBetAmount = bet;
            aviActive = true;
            aviMulti = 1;
            multiSpan.innerText = "1.00x";
            btn.innerText = "🛬 CASH OUT";
            btn.classList.add('cashout-btn');
            statusSpan.innerHTML = "✈️ አውሮፕላኑ እየበረረ ነው...";
            
            if (aviInterval) clearInterval(aviInterval);
            aviInterval = setInterval(() => {
                if (aviActive) {
                    aviMulti += 0.05;
                    multiSpan.innerText = aviMulti.toFixed(2) + "x";
                    if (Math.random() < 0.09 && aviMulti > 1.2) {
                        clearInterval(aviInterval);
                        statusSpan.innerHTML = "💥 አውሮፕላኑ ወደቀ! አጣህ " + aviBetAmount + " ETB";
                        aviActive = false;
                        btn.innerText = "🚀 SPIN";
                        btn.classList.remove('cashout-btn');
                    }
                }
            }, 85);
        } else {
            clearInterval(aviInterval);
            let win = Math.floor(aviBetAmount * aviMulti);
            addWin(win);
            statusSpan.innerHTML = "🏆 ካሽ አውት! አሸነፍክ " + win + " ETB (" + aviMulti.toFixed(2) + "x) 🎉";
            aviActive = false;
            btn.innerText = "🚀 SPIN";
            btn.classList.remove('cashout-btn');
            setTimeout(() => closeGame(), 2000);
        }
    }

    // ========== MEGA BLOCK ==========
    let blockPlayed = false;
    function showMegaBlock() {
        document.getElementById('gameContent').innerHTML = `
            <h2 style="text-align:center;">🧱 MEGA BLOCK</h2>
            <p style="text-align:center; color:#aaa;">አንድ ሳጥን ምረጥ! አንዱ 3x ሽልማት አለው!</p>
            <div class="blocks-grid" id="blocksGrid">
                <div class="block-cell" data-idx="0">❓</div>
                <div class="block-cell" data-idx="1">❓</div>
                <div class="block-cell" data-idx="2">❓</div>
            </div>
            <div id="blockStatus" style="text-align:center; margin-top:15px; color:#ffaa66;"></div>
        `;
        blockPlayed = false;
        let winIndex = Math.floor(Math.random() * 3);
        document.querySelectorAll('.block-cell').forEach(cell => {
            cell.onclick = () => playMegaBlock(cell, winIndex);
        });
    }
    
    function playMegaBlock(cell, winIndex) {
        if (blockPlayed) return;
        let bet = getBet();
        if (!deductBet(bet)) return;
        blockPlayed = true;
        let idx = parseInt(cell.dataset.idx);
        let status = document.getElementById('blockStatus');
        
        if (idx === winIndex) {
            let win = Math.floor(bet * 3);
            addWin(win);
            cell.innerHTML = "🏆";
            cell.style.background = "#ffcc00";
            cell.style.color = "black";
            status.innerHTML = "🎉 ሜጋ ብሎክ! አሸነፍክ " + win + " ETB! 🎉";
        } else {
            cell.innerHTML = "❌";
            cell.style.background = "#5a2a2a";
            status.innerHTML = "😢 ባዶ ሳጥን! አጣህ " + bet + " ETB";
            document.querySelectorAll('.block-cell').forEach((c, i) => {
                if (i === winIndex) {
                    c.innerHTML = "🏆";
                    c.style.background = "#ffcc00";
                }
            });
        }
        setTimeout(() => closeGame(), 2500);
    }

    // ========== Game Router ==========
    function openGame(game) {
        document.getElementById('gameOverlay').style.display = 'block';
        if (game === 'chicken') showChickenRoad();
        else if (game === 'aviator') showAviator();
        else if (game === 'megablock') showMegaBlock();
    }
    
    function closeGame() {
        if (aviInterval) clearInterval(aviInterval);
        if (chickenInterval) clearInterval(chickenInterval);
        document.getElementById('gameOverlay').style.display = 'none';
        aviActive = false;
    }

    loadBalance();
</script>
</body>
</html>
