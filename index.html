       
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wase Bet - ሁሉም ጨዋታዎች</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0b0b0c;
            color: white;
            padding-bottom: 80px;
        }
        .top-bar {
            background: #16171b;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #26282e;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .balance-wrap {
            background: #202228;
            padding: 6px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #323641;
        }
        .balance-amount {
            font-weight: bold;
            font-size: 1.2rem;
            color: #00ffcc;
        }
        .bet-panel {
            background: #16171b;
            margin: 16px;
            padding: 12px 16px;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .bet-label {
            color: #aaa;
            font-size: 0.85rem;
        }
        .bet-input {
            background: #0b0b0c;
            border: 1px solid #323641;
            color: #ffcc00;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 30px;
            width: 110px;
            text-align: center;
        }
        .section-title {
            padding: 0 16px;
            margin: 20px 0 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffcc00;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            padding: 0 16px;
        }
        @media (max-width: 550px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .game-card {
            background: #16171b;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #26282e;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .game-card:hover {
            transform: translateY(-4px);
            border-color: #ffb347;
        }
        .game-thumb {
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            background: radial-gradient(circle at 30% 20%, #1f212a, #0f0f12);
        }
        .game-info {
            padding: 10px 8px;
            text-align: center;
        }
        .game-name {
            font-size: 0.85rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .game-cat {
            font-size: 0.65rem;
            color: #888;
            margin-top: 4px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #16171b;
            border-top: 1px solid #26282e;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 12px;
            z-index: 20;
        }
        .nav-item {
            text-align: center;
            color: #aaa;
            font-size: 0.7rem;
            cursor: pointer;
            flex: 1;
        }
        .nav-icon {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
        .game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11,11,12,0.96);
            backdrop-filter: blur(6px);
            z-index: 200;
            overflow-y: auto;
            padding: 20px 16px;
        }
        .overlay-card {
            background: #16171b;
            border-radius: 32px;
            border: 1px solid #323641;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #2a2c34;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            color: #ffcc00;
        }
        .game-viewport {
            text-align: center;
        }
        .multiplier-big {
            font-size: 3.2rem;
            font-weight: 800;
            color: #ff3366;
            margin: 20px 0;
        }
        .action-btn {
            background: #ffcc00;
            border: none;
            width: 100%;
            padding: 14px;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 15px;
            cursor: pointer;
        }
        .cashout-btn {
            background: #2e7d32;
            color: white;
        }
        .status-msg {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #ffaa66;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">⚡ WASE BET</div>
    <div class="balance-wrap">
        <span>💰 ቀሪ</span>
        <span class="balance-amount" id="globalBalance">500.00</span>
    </div>
</div>

<div class="bet-panel">
    <span class="bet-label">🎲 ውርርድ (ETB)</span>
    <input type="number" id="globalBet" class="bet-input" value="10" step="5" min="2">
</div>

<div class="section-title">🎮 ሁሉም ጨዋታዎች (30)</div>
<div id="gameGrid" class="games-grid"></div>

<div class="bottom-nav">
    <div class="nav-item" onclick="location.reload()">
        <div class="nav-icon">🎮</div>
        <div>Games</div>
    </div>
    <div class="nav-item" onclick="handleAction('deposit')">
        <div class="nav-icon">📥</div>
        <div>Deposit</div>
    </div>
    <div class="nav-item" onclick="handleAction('withdraw')">
        <div class="nav-icon">💸</div>
        <div>Withdraw</div>
    </div>
    <div class="nav-item" onclick="window.open('https://t.me/WaseBet12', '_blank')">
        <div class="nav-icon">☎️</div>
        <div>Support</div>
    </div>
</div>

<div id="gameOverlay" class="game-overlay">
    <div class="overlay-card">
        <div class="back-btn" onclick="closeGame()">⬅ ወደ ጨዋታ ዝርዝር</div>
        <div id="gameContent"></div>
    </div>
</div>

<script>
    // ሁሉም 30 ጨዋታዎች (ከላከኸው ምስል ጋር ተስተካክለዋል)
    const games = [
        "Aviator", "Fast Keno", "Mother Clucker", "Multi Hot 5", "Buffalo",
        "Burning Class", "Fruity Wilds", "Safari Simba", "Chicken Road 2", "Fruit Rush",
        "Mine Gems", "Mines", "Multi Fruit", "Plinko 1000", "Power of Tiger",
        "Rocket Dice", "Sugar Heaven", "Aviamasters", "Hot Keno", "Rabbit Road",
        "Fish Road", "Rocket", "Chicken Roast", "Bingo", "Chicken vs Zombies",
        "Insta Keno", "Mini Roulette", "Dice", "Cricket Road", "Wheel"
    ];

    function getEmoji(name) {
        const n = name.toLowerCase();
        if (n.includes('aviator')) return '✈️';
        if (n.includes('chicken')) return '🐔';
        if (n.includes('rabbit')) return '🐇';
        if (n.includes('fish')) return '🐟';
        if (n.includes('mine')) return '💎';
        if (n.includes('rocket')) return '🚀';
        if (n.includes('dice')) return '🎲';
        if (n.includes('wheel')) return '🎡';
        if (n.includes('keno')) return '🎰';
        if (n.includes('cricket')) return '🏏';
        if (n.includes('fruit')) return '🍒';
        if (n.includes('sugar')) return '🍬';
        if (n.includes('buffalo')) return '🐃';
        if (n.includes('plinko')) return '⚫';
        if (n.includes('bingo')) return '🔢';
        if (n.includes('zombies')) return '🧟';
        if (n.includes('roulette')) return '🎯';
        if (n.includes('aviamasters')) return '🦅';
        if (n.includes('mother clucker')) return '🐓';
        if (n.includes('multi hot')) return '🔥';
        if (n.includes('burning')) return '🔥';
        if (n.includes('safari')) return '🦁';
        if (n.includes('power of tiger')) return '🐯';
        return '🎮';
    }

    function renderGameGrid() {
        const container = document.getElementById('gameGrid');
        container.innerHTML = '';
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => openGame(game);
            card.innerHTML = `
                <div class="game-thumb">${getEmoji(game)}</div>
                <div class="game-info">
                    <div class="game-name">${game}</div>
                    <div class="game-cat">Crash Game</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    let userBalance = 500.00;
    const balanceSpan = document.getElementById('globalBalance');
    const betInput = document.getElementById('globalBet');

    function updateBalanceUI() {
        balanceSpan.innerText = userBalance.toFixed(2);
    }

    function getCurrentBet() {
        let val = parseFloat(betInput.value);
        return (isNaN(val) || val < 2) ? 10 : val;
    }

    function deductBet(amount) {
        if (userBalance < amount) {
            alert("❌ በቂ ነጥብ የለም! እባክዎ ገንዘብ ያስገቡ።");
            return false;
        }
        userBalance -= amount;
        updateBalanceUI();
        return true;
    }

    function addWinnings(amount) {
        userBalance += amount;
        updateBalanceUI();
    }

    function handleAction(type) {
        if (type === 'deposit') {
            alert("📥 ገንዘብ ለማስገባት፦ ቴሌብር 0974107425 (Mulualem) ላይ ያስገቡ። ዝቅተኛ 50 ETB። ማስረጃ ወደ @WaseBet12 ይላኩ።");
            window.open('https://t.me/WaseBet12', '_blank');
        } else {
            alert("💸 መውጫ ለማድረግ ከ300 ETB በላይ መሆን አለበት። አስተዳዳሪ @WaseBet12 ያነጋግሩ።");
            window.open('https://t.me/WaseBet12', '_blank');
        }
    }

    let activeGameInterval = null;
    let isGameActive = false;
    let currentMulti = 1.00;
    let currentBetValue = 0;

    function openGame(gameName) {
        const overlay = document.getElementById('gameOverlay');
        const contentDiv = document.getElementById('gameContent');
        overlay.style.display = 'block';
        contentDiv.innerHTML = `
            <h2 style="text-align:center; margin-bottom:10px;">${getEmoji(gameName)} ${gameName}</h2>
            <div class="game-viewport">
                <div id="gameMulti" class="multiplier-big">1.00x</div>
                <button id="gameActionBtn" class="action-btn">🚀 ጨዋታ ጀምር</button>
                <div id="gameStatus" class="status-msg">⚡ ውርርድ ለመጀመር ቁልፉን ተጫን</div>
            </div>
        `;
        isGameActive = false;
        if (activeGameInterval) clearInterval(activeGameInterval);
        attachGameEvents();
    }

    function attachGameEvents() {
        const actionBtn = document.getElementById('gameActionBtn');
        if (!actionBtn) return;
        actionBtn.onclick = () => {
            if (!isGameActive) {
                let bet = getCurrentBet();
                if (!deductBet(bet)) return;
                currentBetValue = bet;
                isGameActive = true;
                currentMulti = 1.00;
                const multSpan = document.getElementById('gameMulti');
                const statusSpan = document.getElementById('gameStatus');
                multSpan.innerText = "1.00x";
                statusSpan.innerHTML = "✈️ ጨዋታ እየበረረ ነው... ካሽ አውት ተጫን!";
                actionBtn.innerText = "🛬 ካሽ አውት (CASH OUT)";
                actionBtn.classList.add('cashout-btn');
                if (activeGameInterval) clearInterval(activeGameInterval);
                activeGameInterval = setInterval(() => {
                    if (isGameActive) {
                        currentMulti += 0.045;
                        multSpan.innerText = currentMulti.toFixed(2) + "x";
                        if (Math.random() < 0.085 && currentMulti > 1.25) {
                            clearInterval(activeGameInterval);
                            statusSpan.innerHTML = `💥 ጨዋታው ወደቀ! አጣህ ${currentBetValue} ETB`;
                            isGameActive = false;
                            actionBtn.innerText = "🚀 ጨዋታ ጀምር";
                            actionBtn.classList.remove('cashout-btn');
                        }
                    }
                }, 90);
            } else {
                if (activeGameInterval) clearInterval(activeGameInterval);
                let winAmount = Math.floor(currentBetValue * currentMulti);
                addWinnings(winAmount);
                const statusSpan = document.getElementById('gameStatus');
                statusSpan.innerHTML = `🏆 ካሽ አውት! አሸነፍክ ${winAmount} ETB (${currentMulti.toFixed(2)}x) 🎉`;
                isGameActive = false;
                actionBtn.innerText = "🚀 ጨዋታ ጀምር";
                actionBtn.classList.remove('cashout-btn');
            }
        };
    }

    function closeGame() {
        if (activeGameInterval) clearInterval(activeGameInterval);
        document.getElementById('gameOverlay').style.display = 'none';
        isGameActive = false;
    }

    renderGameGrid();
    updateBalanceUI();
</script>
</body>
</html>
