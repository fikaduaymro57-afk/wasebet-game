<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wase Bet - Mini Games</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #2a2a2a; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        h1 { color: #ffcc00; }
        .game-box { background: #333; margin: 15px 0; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        button { background: #ffcc00; color: black; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background: #e6b800; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Wase Bet 🎉</h1>
        <p>እንኳን ወደ ሚኒ ጌሞች በደህና መጡ!</p>
        
        <div class="game-box">
            <h3>✈️ Aviator Game</h3>
            <button onclick="alert('Aviator ጌም በቅርቡ ይጀምራል!')">አሁኑኑ ይጫወቱ</button>
        </div>

        <div class="game-box">
            <h3>🐔 Chicken Road</h3>
            <button onclick="alert('Chicken Road ጌም በቅርቡ ይጀምራል!')">አሁኑኑ ይጫወቱ</button>
        </div>
    </div>
</body>
</html>
