<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wase Bet – ኦፊሴላዊ የጨዋታ መድረክ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0b0b0c;
            color: white;
            padding-bottom: 80px;
        }
        .top-bar {
            background: #16171b;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #26282e;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .balance-wrap {
            background: #202228;
            padding: 6px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #323641;
        }
        .balance-amount {
            font-weight: bold;
            font-size: 1.2rem;
            color: #00ffcc;
        }
        .bet-panel {
            background: #16171b;
            margin: 16px;
            padding: 12px 16px;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .bet-label {
            color: #aaa;
            font-size: 0.85rem;
        }
        .bet-quick-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .bet-quick {
            background: #2a2c34;
            border: none;
            color: #ffcc00;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .bet-input {
            background: #0b0b0c;
            border: 1px solid #323641;
            color: #ffcc00;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 30px;
            width: 100px;
            text-align: center;
        }
        .section-title {
            padding: 0 16px;
            margin: 20px 0 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffcc00;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            padding: 0 16px;
        }
        @media (max-width: 550px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .game-card {
            background: #111;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #26282e;
        }
        .game-card:hover {
            transform: translateY(-4px);
            border-color: #ffb347;
        }
        .game-thumb {
            height: 140px;
            overflow: hidden;
            background: #1f212a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .game-info {
            padding: 10px 8px;
            text-align: center;
        }
        .game-name {
            font-size: 14px;
            font-weight: 700;
        }
        .game-cat {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #16171b;
            border-top: 1px solid #26282e;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 12px;
            z-index: 20;
        }
        .nav-item {
            text-align: center;
            color: #aaa;
            font-size: 0.7rem;
            cursor: pointer;
            flex: 1;
        }
        .nav-icon {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
        /* Game overlay */
        .game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11,11,12,0.97);
            backdrop-filter: blur(8px);
            z-index: 200;
            overflow-y: auto;
            padding: 20px 16px;
        }
        .overlay-card {
            background: #16171b;
            border-radius: 32px;
            border: 1px solid #323641;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #2a2c34;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            color: #ffcc00;
        }
        .action-btn {
            background: #ffcc00;
            border: none;
            width: 100%;
            padding: 14px;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 1rem;
        }
        .cashout-btn {
            background: #2e7d32;
            color: white;
        }
        .multiplier-big {
            font-size: 3rem;
            font-weight: bold;
            color: #ff3366;
            margin: 20px 0;
        }
        .status-msg {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #ffaa66;
        }
        /* Aviator canvas */
        #aviatorGraph {
            width: 100%;
            height: auto;
            background: #000;
            border-radius: 12px;
        }
        /* Chicken road animation */
        .road-container {
            position: relative;
            height: 200px;
            background: #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            margin: 15px 0;
        }
        .chicken-char {
            position: absolute;
            left: 20px;
            bottom: 10px;
            font-size: 3rem;
            transition: left 0.05s linear;
        }
        .truck-char {
            position: absolute;
            right: -80px;
            bottom: 10px;
            font-size: 3.5rem;
            transition: right 0.05s linear;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">⚡ WASE BET</div>
    <div class="balance-wrap">
        <span>💰 ቀሪ</span>
        <span class="balance-amount" id="globalBalance">150.00</span>
    </div>
</div>

<div class="bet-panel">
    <span class="bet-label">🎲 ውርርድ (ETB)</span>
    <div class="bet-quick-buttons">
        <button class="bet-quick" data-bet="5">5</button>
        <button class="bet-quick" data-bet="10">10</button>
        <button class="bet-quick" data-bet="20">20</button>
        <button class="bet-quick" data-bet="50">50</button>
        <button class="bet-quick" data-bet="100">100</button>
    </div>
    <input type="number" id="customBet" class="bet-input" value="5" step="5" min="5" max="100">
</div>

<div class="section-title">🎮 ሁሉም ጨዋታዎች (40+)</div>
<div id="gameGrid" class="games-grid"></div>

<div class="bottom-nav">
    <div class="nav-item" onclick="location.reload()"><div class="nav-icon">🎮</div><div>Games</div></div>
    <div class="nav-item" onclick="handleAction('deposit')"><div class="nav-icon">📥</div><div>Deposit</div></div>
    <div class="nav-item" onclick="handleAction('withdraw')"><div class="nav-icon">💸</div><div>Withdraw</div></div>
    <div class="nav-item" onclick="window.open('https://t.me/Wase_Bet', '_blank')"><div class="nav-icon">👥</div><div>Group</div></div>
    <div class="nav-item" onclick="window.open('https://t.me/WaseBet12', '_blank')"><div class="nav-icon">☎️</div><div>Support</div></div>
</div>

<div id="gameOverlay" class="game-overlay">
    <div class="overlay-card">
        <div class="back-btn" onclick="closeGame()">⬅ ወደ ጨዋታ ዝርዝር</div>
        <div id="gameContent"></div>
    </div>
</div>

<script>
    // ---------- የጨዋታ ዝርዝር ----------
    const games = [
        "Aviator", "Fast Keno", "Mother Clucker", "Multi Hot 5", "Buffalo",
        "Burning Class", "Fruity Wilds", "Safari Simba", "Chicken Road 2", "Fruit Rush",
        "Mine Gems", "Mines", "Rocket Dice", "Sugar Heaven", "Aviamasters",
        "Hot Keno", "Rabbit Road", "Fish Road", "Rocket", "Chicken Roast",
        "Bingo", "Chicken vs Zombies", "Insta Keno", "Mini Roulette", "Dice",
        "Cricket Road", "Wheel", "Chicken Road Gold", "Chicken Road Ice",
        "Chicken Road Vegas", "Mega Block", "Penalty Nations", "Classic Keno",
        "Chicken Highway", "Juicy Fruits", "Roulette"
    ];

    function getEmoji(name) {
        const n = name.toLowerCase();
        if (n.includes('aviator')) return '✈️';
        if (n.includes('chicken')) return '🐔';
        if (n.includes('wheel')) return '🎡';
        return '🎮';
    }

    // ---------- ቀሪ ሂሳብ እና ውርርድ (መነሻ 150) ----------
    let userBalance = 150.00;
    const balanceSpan = document.getElementById('globalBalance');
    const customBetInput = document.getElementById('customBet');

    function updateBalanceUI() {
        balanceSpan.innerText = userBalance.toFixed(2);
        localStorage.setItem('wasebet_balance', userBalance);
    }

    function loadBalance() {
        let saved = localStorage.getItem('wasebet_balance');
        userBalance = (saved !== null && !isNaN(parseFloat(saved))) ? parseFloat(saved) : 150.00;
        updateBalanceUI();
    }

    function getCurrentBet() {
        let val = parseFloat(customBetInput.value);
        if (isNaN(val) || val < 5) return 5;
        if (val > 100) return 100;
        return val;
    }

    document.querySelectorAll('.bet-quick').forEach(btn => {
        btn.addEventListener('click', () => {
            customBetInput.value = parseInt(btn.dataset.bet);
        });
    });

    function deductBet(amount) {
        if (userBalance < amount) {
            alert(`❌ በቂ ነጥብ የለም! ቀሪ: ${userBalance.toFixed(2)} ETB\nዝቅተኛ ማስገቢያ 100 ETB`);
            return false;
        }
        userBalance -= amount;
        updateBalanceUI();
        return true;
    }

    function addWinnings(amount) {
        userBalance += amount;
        updateBalanceUI();
    }

    function handleAction(type) {
        if (type === 'deposit') {
            alert("📥 ገንዘብ ለማስገባት፦\n📞 ቴሌብር: 0974107425 (Mulualem)\n💵 ዝቅተኛ: 100 ETB\n💵 ከፍተኛ: 10,000 ETB\n\nከላክክ በኋላ ማስረጃ ወደ @WaseBet12 ላክ።");
            window.open('https://t.me/WaseBet12', '_blank');
        } else {
            alert("💸 ገንዘብ ለማውጣት፦\n⚠️ ዝቅተኛ መውጫ: 500 ETB\n\nአስተዳዳሪ @WaseBet12 ያነጋግሩ።");
            window.open('https://t.me/WaseBet12', '_blank');
        }
    }

    // ========== የተለያዩ ጨዋታዎች ሎጂክ ==========
    let activeGameInterval = null;
    let isGameActive = false;
    let currentMulti = 1.00;
    let currentBetValue = 0;

    // ---- Aviator ግራፍ መሳል ----
    function drawAviatorGraph() {
        const canvas = document.getElementById("aviatorGraph");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width = Math.min(400, window.innerWidth - 60);
        const h = 220;
        canvas.width = w;
        canvas.height = h;
        ctx.clearRect(0, 0, w, h);
        ctx.beginPath();
        ctx.moveTo(10, h - 20);
        ctx.bezierCurveTo(w * 0.2, h - 60, w * 0.5, 40, w - 20, 20);
        ctx.strokeStyle = "#ff4444";
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    // ---- ዊል ማሽከርከር እና ሽልማት ----
    function spinWheel() {
        const wheel = document.getElementById("wheel");
        if (!wheel) return;
        const bet = getCurrentBet();
        if (!deductBet(bet)) return;
        const randomDeg = 3600 + Math.random() * 1000;
        wheel.style.transition = "5s ease-out";
        wheel.style.transform = `rotate(${randomDeg}deg)`;
        setTimeout(() => {
            const stopDeg = (randomDeg % 360);
            let multiplier = 1.0;
            if (stopDeg < 45) multiplier = 1.5;
            else if (stopDeg < 90) multiplier = 2.0;
            else if (stopDeg < 135) multiplier = 0.5;
            else if (stopDeg < 180) multiplier = 3.0;
            else if (stopDeg < 225) multiplier = 1.2;
            else if (stopDeg < 270) multiplier = 0;
            else if (stopDeg < 315) multiplier = 4.0;
            else multiplier = 2.5;
            if (multiplier > 0) {
                const win = Math.floor(bet * multiplier);
                addWinnings(win);
                alert(`🎡 ዊል ቆመ! ${multiplier}x → ${win} ETB አሸነፍክ!`);
            } else {
                alert(`💥 ዊል ባዶ ላይ ቆመ! አጣህ ${bet} ETB.`);
            }
            closeGame();
        }, 5000);
    }

    // ---- Chicken Road አኒሜሽን (ተመሳሳይ ሎጂክ ለሁሉም ቺከን ጨዋታዎች) ----
    let chickenInterval = null;
    function startChickenGame(gameName, bet) {
        const chickenDiv = document.getElementById("chickenChar");
        const truckDiv = document.getElementById("truckChar");
        if (!chickenDiv || !truckDiv) return;
        let chickenX = 20;
        let truckX = 320;
        chickenDiv.style.left = chickenX + "px";
        truckDiv.style.right = "-80px";
        if (chickenInterval) clearInterval(chickenInterval);
        chickenInterval = setInterval(() => {
            chickenX += 6;
            truckX -= 7;
            chickenDiv.style.left = chickenX + "px";
            truckDiv.style.right = (window.innerWidth - truckX) + "px";
            if (chickenX >= 280) {
                clearInterval(chickenInterval);
                const win = Math.floor(bet * 2.0);
                addWinnings(win);
                document.getElementById("chickenStatus").innerHTML = `🎉 ዶሮዋ ደረሰች! አሸነፍክ ${win} ETB!`;
                setTimeout(() => closeGame(), 2000);
            } else if (Math.abs(chickenX - (340 - truckX)) < 40 && truckX > 100) {
                clearInterval(chickenInterval);
                document.getElementById("chickenStatus").innerHTML = `💥 መኪና መታች! አጣህ ${bet} ETB.`;
                setTimeout(() => closeGame(), 2000);
            }
        }, 60);
    }

    // ========== ዋናው openGame ተግባር (በተጠቃሚው መሰረት) ==========
    function openGame(gameName) {
        const overlay = document.getElementById('gameOverlay');
        const contentDiv = document.getElementById('gameContent');
        overlay.style.display = 'block';
        if (activeGameInterval) clearInterval(activeGameInterval);
        isGameActive = false;

        // ለAviator ልዩ በይነገጽ
        if (gameName === "Aviator") {
            contentDiv.innerHTML = `
                <div style="background:#111;padding:15px;border-radius:15px;">
                    <h2 style="color:#ff4444">✈️ Aviator</h2>
                    <div style="height:220px; background:#000; border-radius:12px; overflow:hidden;">
                        <canvas id="aviatorGraph" width="320" height="220" style="width:100%; height:auto;"></canvas>
                    </div>
                    <div class="multiplier-big" id="aviMulti">1.00x</div>
                    <button id="gameActionBtn" class="action-btn">🚀 SPIN (ውርርድ አስጀምር)</button>
                    <div id="gameStatus" class="status-msg">⚡ ለመጀመር SPIN ተጫን</div>
                </div>
            `;
            drawAviatorGraph();
            attachAviatorEvents();
        }
        // ማንኛውም "Chicken" በሚል ስም ለሚጀምር ጨዋታ
        else if (gameName.toLowerCase().includes("chicken")) {
            contentDiv.innerHTML = `
                <div style="background:#222;padding:15px;border-radius:15px;">
                    <h2>🐔 ${gameName}</h2>
                    <div class="road-container">
                        <div id="chickenChar" class="chicken-char">🐔</div>
                        <div id="truckChar" class="truck-char">🚚</div>
                    </div>
                    <button id="gameActionBtn" class="action-btn">🏁 መንገድ አቋርጥ</button>
                    <div id="chickenStatus" class="status-msg">⚡ ዝግጁ</div>
                </div>
            `;
            attachChickenEvents(gameName);
        }
        // ለWheel ጨዋታ
        else if (gameName === "Wheel") {
            contentDiv.innerHTML = `
                <div style="text-align:center">
                    <h2>🎡 Lucky Wheel</h2>
                    <div id="wheel" style="width:250px; height:250px; margin:auto; border-radius:50%; background:conic-gradient(red 0deg 45deg, blue 45deg 90deg, green 90deg 135deg, yellow 135deg 180deg, purple 180deg 225deg, orange 225deg 270deg, cyan 270deg 315deg, pink 315deg 360deg);"></div>
                    <button id="wheelSpinBtn" class="action-btn">🎲 SPIN</button>
                </div>
            `;
            document.getElementById("wheelSpinBtn").onclick = () => {
                const bet = getCurrentBet();
                if (deductBet(bet)) spinWheel();
            };
        }
        // ሌሎች ጨዋታዎች (መደበኛ Crash Game)
        else {
            contentDiv.innerHTML = `
                <h2 style="text-align:center;">${getEmoji(gameName)} ${gameName}</h2>
                <div class="multiplier-big" id="gameMulti">1.00x</div>
                <button id="gameActionBtn" class="action-btn">🚀 SPIN</button>
                <div id="gameStatus" class="status-msg">⚡ ዝግጁ</div>
            `;
            attachDefaultGameEvents(gameName);
        }
    }

    // ለAviator ክስተቶች (multiplier እየጨመረ እንደ Crash Game)
    function attachAviatorEvents() {
        const actionBtn = document.getElementById('gameActionBtn');
        if (!actionBtn) return;
        actionBtn.onclick = () => {
            if (!isGameActive) {
                let bet = getCurrentBet();
                if (!deductBet(bet)) return;
                currentBetValue = bet;
                isGameActive = true;
                currentMulti = 1.00;
                const multSpan = document.getElementById('aviMulti');
                const statusSpan = document.getElementById('gameStatus');
                multSpan.innerText = "1.00x";
                statusSpan.innerHTML = "✈️ እየበረረ ነው... ካሽ አውት ተጫን!";
                actionBtn.innerText = "🛬 ካሽ አውት (CASH OUT)";
                actionBtn.classList.add('cashout-btn');
                if (activeGameInterval) clearInterval(activeGameInterval);
                activeGameInterval = setInterval(() => {
                    if (isGameActive) {
                        currentMulti += 0.045;
                        multSpan.innerText = currentMulti.toFixed(2) + "x";
                        if (Math.random() < 0.09 && currentMulti > 1.2) {
                            clearInterval(activeGameInterval);
                            statusSpan.innerHTML = `💥 አውሮፕላኑ ወደቀ! አጣህ ${currentBetValue} ETB`;
                            isGameActive = false;
                            actionBtn.innerText = "🚀 SPIN";
                            actionBtn.classList.remove('cashout-btn');
                        }
                    }
                }, 90);
            } else {
                if (activeGameInterval) clearInterval(activeGameInterval);
                let win = Math.floor(currentBetValue * currentMulti);
                addWinnings(win);
                document.getElementById('gameStatus').innerHTML = `🏆 ካሽ አውት! አሸነፍክ ${win} ETB (${currentMulti.toFixed(2)}x) 🎉`;
                isGameActive = false;
                actionBtn.innerText = "🚀 SPIN";
                actionBtn.classList.remove('cashout-btn');
            }
        };
    }

    // ለChicken ጨዋታ
    function attachChickenEvents(gameName) {
        const actionBtn = document.getElementById('gameActionBtn');
        if (!actionBtn) return;
        actionBtn.onclick = () => {
            if (chickenInterval) return;
            let bet = getCurrentBet();
            if (!deductBet(bet)) return;
            startChickenGame(gameName, bet);
        };
    }

    // ለሌሎች ጨዋታዎች (መደበኛ Crash Game)
    function attachDefaultGameEvents(gameName) {
        const actionBtn = document.getElementById('gameActionBtn');
        if (!actionBtn) return;
        actionBtn.onclick = () => {
            if (!isGameActive) {
                let bet = getCurrentBet();
                if (!deductBet(bet)) return;
                currentBetValue = bet;
                isGameActive = true;
                currentMulti = 1.00;
                const multSpan = document.getElementById('gameMulti');
                const statusSpan = document.getElementById('gameStatus');
                multSpan.innerText = "1.00x";
                statusSpan.innerHTML = `🎲 ${gameName} እየበረረ ነው...`;
                actionBtn.innerText = "🛬 ካሽ አውት";
                actionBtn.classList.add('cashout-btn');
                if (activeGameInterval) clearInterval(activeGameInterval);
                activeGameInterval = setInterval(() => {
                    if (isGameActive) {
                        currentMulti += 0.045;
                        multSpan.innerText = currentMulti.toFixed(2) + "x";
                        if (Math.random() < 0.09 && currentMulti > 1.2) {
                            clearInterval(activeGameInterval);
                            statusSpan.innerHTML = `💥 ${gameName} ወደቀ! አጣህ ${currentBetValue} ETB`;
                            isGameActive = false;
                            actionBtn.innerText = "🚀 SPIN";
                            actionBtn.classList.remove('cashout-btn');
                        }
                    }
                }, 90);
            } else {
                if (activeGameInterval) clearInterval(activeGameInterval);
                let win = Math.floor(currentBetValue * currentMulti);
                addWinnings(win);
                document.getElementById('gameStatus').innerHTML = `🏆 ካሽ አውት! አሸነፍክ ${win} ETB (${currentMulti.toFixed(2)}x) 🎉`;
                isGameActive = false;
                actionBtn.innerText = "🚀 SPIN";
                actionBtn.classList.remove('cashout-btn');
            }
        };
    }

    function closeGame() {
        if (activeGameInterval) clearInterval(activeGameInterval);
        if (chickenInterval) clearInterval(chickenInterval);
        document.getElementById('gameOverlay').style.display = 'none';
        isGameActive = false;
    }

    // ጨዋታዎችን በግሪድ ማሳየት
    function renderGameGrid() {
        const container = document.getElementById('gameGrid');
        container.innerHTML = '';
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => openGame(game);
            card.innerHTML = `
                <div class="game-thumb">${getEmoji(game)}</div>
                <div class="game-info">
                    <div class="game-name">${game}</div>
                    <div class="game-cat">Crash Game</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    loadBalance();
    renderGameGrid();
</script>
</body>
</html>
