<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wase Bet - Multi Games</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #121212; color: white; margin: 0; padding: 15px; }
        .container { max-width: 480px; margin: auto; background: #1e1e1e; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        h1 { color: #ffcc00; margin: 5px 0; font-size: 28px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* Balance Bar */
        .balance-bar { background: #292929; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #3d3d3d; display: flex; justify-content: space-between; align-items: center; }
        .bal-title { font-size: 14px; color: #aaa; }
        .bal-amount { font-size: 20px; color: #00ffcc; font-weight: bold; }
        
        /* Bet Controls */
        .bet-container { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .bet-container label { font-size: 14px; color: #ffcc00; font-weight: bold; }
        .bet-container input { width: 80px; background: #111; color: #fff; border: 1px solid #444; padding: 6px; border-radius: 5px; text-align: center; font-size: 16px; }

        /* Navigation Grid */
        .game-nav { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .nav-btn { background: #2c2c2c; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .nav-btn:hover { background: #3d3d3d; border-color: #ffcc00; }
        .nav-btn.active { background: #ffcc00; color: black; border-color: #ffcc00; }

        /* Game Screens */
        .game-screen { display: none; background: #222; padding: 20px; border-radius: 12px; border: 1px solid #333; min-height: 220px; position: relative; }
        .game-screen.active { display: block; }

        /* Aviator Big Graph Area */
        .aviator-graph { background: linear-gradient(180deg, #150515 0%, #0a020a 100%); height: 180px; border-radius: 8px; position: relative; overflow: hidden; border: 1px solid #3a0e2a; margin-bottom: 15px; }
        .plane { font-size: 30px; position: absolute; bottom: 10px; left: 10px; transition: transform 0.1s linear; transform: translate(0, 0); }
        .multiplier { font-size: 42px; color: #ff3366; font-weight: bold; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-shadow: 0 0 10px rgba(255,51,102,0.5); }

        /* Chicken Road Asphalt Area */
        .asphalt-road { background: #333; height: 140px; border-radius: 8px; position: relative; margin-bottom: 15px; border-top: 3px dashed #fff; border-bottom: 3px dashed #fff; box-sizing: border-box; overflow: hidden; }
        .road-line { position: absolute; top: 50%; width: 100%; border-top: 2px dashed #ffcc00; }
        .chicken-avatar { font-size: 28px; position: absolute; bottom: 5px; left: 45%; transition: 0.3s; }
        .car-obstacle { font-size: 24px; position: absolute; top: 45%; left: -40px; transition: none; }

        /* Lottery and Blocks HTML styles */
        .lottery-grid, .blocks-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .grid-cell { background: #333; padding: 12px 0; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; border: 1px solid #444; }
        .grid-cell:hover { background: #444; }

        /* Action Buttons */
        .action-btn { background: #00cc66; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; box-shadow: 0 3px 6px rgba(0,0,0,0.3); }
        .action-btn:hover { background: #00b359; }

        /* Wallet Section */
        .wallet-box { display: flex; gap: 10px; margin-top: 15px; }
        .wallet-btn { flex: 1; padding: 10px; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; color: black; }
        .dep-btn { background: #00ffcc; }
        .wit-btn { background: #ff5555; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 Wase Bet 🎉</h1>
        
        <!-- Live Balance Header -->
        <div class="balance-bar">
            <div>
                <div class="bal-title">የእርስዎ ቀሪ ሂሳብ</div>
                <div id="user-balance" class="bal-amount">500.00 ETB</div>
            </div>
            <div>ℹ️ Live</div>
        </div>

        <!-- Universal Bet Controls -->
        <div class="bet-container">
            <label>💵 የመወራረጃ ብር (Min: 2):</label>
            <input type="number" id="bet-amount" value="10" min="2">
        </div>

        <!-- Game Selector Menu -->
        <div class="game-nav">
            <button class="nav-btn active" onclick="switchTab('aviator')">✈️ Aviator</button>
            <button class="nav-btn" onclick="switchTab('chicken')">🐔 Chicken Road 2</button>
            <button class="nav-btn" onclick="switchTab('lottery')">🎰 Lottery</button>
            <button class="nav-btn" onclick="switchTab('blocks')">🧱 Mega Blocks</button>
        </div>

        <!-- AVIATOR SCREEN -->
        <div id="screen-aviator" class="game-screen active">
            <div class="aviator-graph">
                <div id="aviator-mult" class="multiplier">1.00x</div>
                <div id="plane-icon" class="plane">✈️</div>
            </div>
            <button id="btn-aviator-action" class="action-btn" onclick="toggleAviator()">አውሮፕላኑን አስጀምር</button>
        </div>

        <!-- CHICKEN ROAD SCREEN -->
        <div id="screen-chicken" class="game-screen">
            <div class="asphalt-road">
                <div class="road-line"></div>
                <div id="car-enemy" class="car-obstacle">🚗</div>
                <div id="chicken-player" class="chicken-avatar">🐔</div>
            </div>
            <button id="btn-chicken-action" class="action-btn" onclick="crossRoad()">አስፋልቱን አሻግር</button>
        </div>

        <!-- LOTTERY SCREEN -->
        <div id="screen-lottery" class="game-screen">
            <p style="margin: 0 0 10px 0; color: #ffcc00;">ከ 1 እስከ 8 አንድ ዕድለኛ ቁጥር ይምረጡ!</p>
            <div class="lottery-grid">
                <div class="grid-cell" onclick="playLottery(1)">1</div>
                <div class="grid-cell" onclick="playLottery(2)">2</div>
                <div class="grid-cell" onclick="playLottery(3)">3</div>
                <div class="grid-cell" onclick="playLottery(4)">4</div>
                <div class="grid-cell" onclick="playLottery(5)">5</div>
                <div class="grid-cell" onclick="playLottery(6)">6</div>
                <div class="grid-cell" onclick="playLottery(7)">7</div>
                <div class="grid-cell" onclick="playLottery(8)">8</div>
            </div>
        </div>

        <!-- MEGA BLOCKS SCREEN -->
        <div id="screen-blocks" class="game-screen">
            <p style="margin: 0 0 10px 0; color: #ffcc00;">የከበረ ማዕድን ያለበትን ብሎክ ይገምቱ 💎</p>
            <div class="blocks-grid">
                <div class="grid-cell" onclick="playBlocks()">📦</div>
                <div class="grid-cell" onclick="playBlocks()">📦</div>
                <div class="grid-cell" onclick="playBlocks()">📦</div>
                <div class="grid-cell" onclick="playBlocks()">📦</div>
            </div>
        </div>

        <!-- WALLET AND SUPPORT MANAGEMENT -->
        <div class="wallet-box">
            <button class="wallet-btn dep-btn" onclick="handleWallet('Deposit')">📥 ገንዘብ አስገባ (Deposit)</button>
            <button class="wallet-btn wit-btn" onclick="handleWallet('Withdraw')">💸 ብር አውጣ (Withdraw)</button>
        </div>
    </div>

    <script>
        let balance = 500.00;
        let aviatorInterval;
        let carInterval;
        let currentMult = 1.00;
        let isAviatorRunning = false;

        function updateBalanceDisplay() {
            document.getElementById('user-balance').innerText = balance.toFixed(2) + ' ETB';
        }

        function getBet() {
            let val = parseFloat(document.getElementById('bet-amount').value);
            if (isNaN(val) || val < 2) {
                alert('እባክዎ ትክክለኛ የመወራረጃ ብር ያስገቡ! (አነስተኛ 2 ብር)');
                return false;
            }
            return val;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('screen-' + tabId).classList.add('active');
            event.target.classList.add('active');
            
            // Clean state if toggled
            clearInterval(aviatorInterval);
            clearInterval(carInterval);
            resetAviatorUI();
            resetChickenUI();
        }

        // --- AVIATOR GRAPH LOGIC ---
        function toggleAviator() {
            let bet = getBet();
            if (!bet) return;

            if (!isAviatorRunning) {
                if (balance < bet) { return alert('በቂ ቀሪ ሂሳብ የሎትም!'); }
                balance -= bet;
                updateBalanceDisplay();
                
                isAviatorRunning = true;
                currentMult = 1.00;
                document.getElementById('btn-aviator-action').innerText = 'Cash Out (ብርህን ሰብስብ)';
                document.getElementById('btn-aviator-action').style.background = '#ff3366';
                
                let plane = document.getElementById('plane-icon');
                plane.style.transform = 'translate(0, 0)';
                
                aviatorInterval = setInterval(() => {
                    currentMult += 0.04;
                    document.getElementById('aviator-mult').innerText = currentMult.toFixed(2) + 'x';
                    
                    // Live curve animation movement
                    let progress = (currentMult - 1) * 15;
                    plane.style.transform = `translate(${Math.min(progress * 2, 320)}px, -${Math.min(progress, 120)}px)`;

                    // Crash probability
                    if (Math.random() < 0.025 && currentMult > 1.30) {
                        clearInterval(aviatorInterval);
                        document.getElementById('aviator-mult').innerText = '💥 Flew Away!';
                        isAviatorRunning = false;
                        setTimeout(resetAviatorUI, 2000);
                    }
                }, 100);
            } else {
                // Cash Out Triggered
                clearInterval(aviatorInterval);
                let wonAmount = bet * currentMult;
                balance += wonAmount;
                updateBalanceDisplay();
                alert(`💰 ማሸነፍዎን አረጋገጡ! በ ${currentMult.toFixed(2)}x ተባዝቶ ${wonAmount.toFixed(2)} ETB ገባሎት!`);
                isAviatorRunning = false;
                resetAviatorUI();
            }
        }

        function resetAviatorUI() {
            isAviatorRunning = false;
            document.getElementById('btn-aviator-action').innerText = 'አውሮፕላኑን አስጀምር';
            document.getElementById('btn-aviator-action').style.background = '#00cc66';
            document.getElementById('aviator-mult').innerText = '1.00x';
            document.getElementById('plane-icon').style.transform = 'translate(0, 0)';
        }

        // --- CHICKEN ROAD 2 (ASPHALT SYSTEM) ---
        function crossRoad() {
            let bet = getBet();
            if (!bet) return;
            if (balance < bet) return alert('በቂ ቀሪ ሂሳብ የሎትም!');

            balance -= bet;
            updateBalanceDisplay();

            let chicken = document.getElementById('chicken-player');
            let car = document.getElementById('car-enemy');
            
            chicken.style.bottom = '100px'; // Chicken jumps forward to cross
            
            // Spawn random speedy car obstacle
            let carPos = -40;
            car.style.left = carPos + 'px';
            
            carInterval = setInterval(() => {
                carPos += 25;
                car.style.left = carPos + 'px';
                
                // Crash Collision Check
                if (carPos > 170 && carPos < 230) {
                    clearInterval(carInterval);
                    alert('❌ ወዮ! ዶሮዋ በአስፋልቱ ላይ በባቡር/መኪና ተገጨች!');
                    resetChickenUI();
                }
                
                if (carPos > 450) {
                    clearInterval(carInterval);
                    let won = bet * 2.5; // Fixed road cross payout
                    balance += won;
                    updateBalanceDisplay();
                    alert(`🎉 ተሳክቷል! ዶሮዋ አስፋልቱን በሰላም ተሻገረች! ${won} ETB አሸነፉ!`);
                    resetChickenUI();
                }
            }, 50);
        }

        function resetChickenUI() {
            clearInterval(carInterval);
            document.getElementById('chicken-player').style.bottom = '5px';
            document.getElementById('car-enemy').style.left = '-40px';
        }

        // --- LOTTERY GAME ---
        function playLottery(selectedNum) {
            let bet = getBet();
            if (!bet) return;
            if (balance < bet) return alert('በቂ ቀሪ ሂሳብ የሎትም!');

            balance -= bet;
            let winningNum = Math.floor(Math.random() * 8) + 1;
            
            if (selectedNum === winningNum) {
                let won = bet * 5;
                balance += won;
                alert(`🎯 ዕድለኛ ኖት! የወጣው ቁጥር ${winningNum} ነው። በ 5 እጥፍ አሸነፉ: +${won} ETB!`);
            } else {
                alert(`😢 አልተሳካም! የወጣው ቁጥር ${winningNum} ነበር። ይሞክሩ!`);
            }
            updateBalanceDisplay();
        }

        // --- MEGA BLOCKS ---
        function playBlocks() {
            let bet = getBet();
            if (!bet) return;
            if (balance < bet) return alert('በቂ ቀሪ ሂሳብ የሎትም!');

            balance -= bet;
            if (Math.random() > 0.4) {
                let won = bet * 2;
                balance += won;
                alert(`💎 ማዕድኑን አገኙ! ብሎኩ አልማዝ ነበረው! +${won} ETB አሸነፉ!`);
            } else {
                alert('💥 ባዶ ብሎክ ወይም ፈንጂ አገጠሞት! በሚቀጥለው ያሸንፋሉ!');
            }
            updateBalanceDisplay();
        }

        // --- TRANSACTION ROUTER TO SUPPORT ---
        function handleWallet(actionType) {
            alert(`ወደ ${actionType} ክፍል በመግባት ላይ... ለፈጣን ማረጋገጫ ወደ ሰፖርት ቀጥታ መልዕክት ይላኩ።`);
            window.open('https://t.me/WaseBet12', '_blank');
        }
    </script>
</body>
</html>
