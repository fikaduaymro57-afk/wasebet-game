<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wase Bet - All Games</title>
    <style>
        body { font-family: sans-serif; background-color: #0b0b0c; color: white; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: #1f212a; border-radius: 8px; padding: 10px; text-align: center; border: 1px solid #333; }
        .card-name { font-size: 11px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="grid" id="game-list"></div>
    <script>
        const games = [
            "Aviator", "Fast Keno", "Mother Clucker", "Multi Hot 5", "Buffalo", 
            "Burning Class", "Fruity Wilds", "Safari Simba", "Chicken Road 2", 
            "Fruit Rush", "Mine Gems", "Mines", "Multi Fruit", "Plinko 1000", 
            "Power of Tiger", "Rocket Dice", "Sugar Heaven", "Aviamasters", 
            "Hot Keno", "Rabbit Road", "Fish Road", "Rocket", "Chicken Roast", 
            "Bingo", "Chicken vs Zombies", "Insta Keno", "Mini Roulette", 
            "Dice", "Cricket Road", "Wheel", "Roulette", "Chicken Road Gold", 
            "Chicken Road Ice", "Chicken Road Vegas", "Gold Gold Go", 
            "Mega Block", "Penalty Nations", "Classic Keno"
        ];
        const container = document.getElementById('game-list');
        games.forEach(g => {
            container.innerHTML += `<div class="card">🎮<div class="card-name">${g}</div></div>`;
        });
    </script>
</body>
</html>
