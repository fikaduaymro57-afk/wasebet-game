<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wase Bet – ኦፊሴላዊ የጨዋታ መድረክ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
        }
        body {
            background: #0b0b0c;
            color: white;
            padding-bottom: 80px;
        }
        .top-bar {
            background: #16171b;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #26282e;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .balance-wrap {
            background: #202228;
            padding: 6px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #323641;
        }
        .balance-amount {
            font-weight: bold;
            font-size: 1.2rem;
            color: #00ffcc;
        }
        .bet-panel {
            background: #16171b;
            margin: 16px;
            padding: 12px 16px;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .bet-label {
            color: #aaa;
            font-size: 0.85rem;
        }
        .bet-quick-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .bet-quick {
            background: #2a2c34;
            border: none;
            color: #ffcc00;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.1s;
        }
        .bet-quick:active {
            background: #ffcc00;
            color: black;
        }
        .bet-input {
            background: #0b0b0c;
            border: 1px solid #323641;
            color: #ffcc00;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 30px;
            width: 100px;
            text-align: center;
        }
        .section-title {
            padding: 0 16px;
            margin: 20px 0 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffcc00;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            padding: 0 16px;
        }
        @media (max-width: 550px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .game-card {
            background: #111;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            border: 1px solid #26282e;
        }
        .game-card:hover {
            transform: translateY(-4px);
            border-color: #ffb347;
        }
        .game-thumb {
            height: 140px;
            overflow: hidden;
            background: #1f212a;
        }
        .game-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .game-info {
            padding: 10px 8px;
            text-align: center;
        }
        .game-name {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .game-cat {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #16171b;
            border-top: 1px solid #26282e;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 12px;
            z-index: 20;
        }
        .nav-item {
            text-align: center;
            color: #aaa;
            font-size: 0.7rem;
            cursor: pointer;
            flex: 1;
            transition: 0.1s;
        }
        .nav-item:active {
            color: #ffcc00;
        }
        .nav-icon {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
        .game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11,11,12,0.97);
            backdrop-filter: blur(8px);
            z-index: 200;
            overflow-y: auto;
            padding: 20px 16px;
        }
        .overlay-card {
            background: #16171b;
            border-radius: 32px;
            border: 1px solid #323641;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #2a2c34;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            color: #ffcc00;
        }
        .game-viewport {
            text-align: center;
        }
        .multiplier-big {
            font-size: 3.2rem;
            font-weight: 800;
            color: #ff3366;
            margin: 20px 0;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 10px 25px;
            border-radius: 60px;
        }
        .action-btn {
            background: #ffcc00;
            border: none;
            width: 100%;
            padding: 14px;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 1rem;
        }
        .cashout-btn {
            background: #2e7d32;
            color: white;
        }
        .status-msg {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #ffaa66;
        }
        .plane-animation {
            position: relative;
            height: 100px;
            margin: 10px 0;
        }
        .plane {
            font-size: 2.5rem;
            position: absolute;
            left: 0;
            bottom: 0;
            transition: left 0.05s linear;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">⚡ WASE BET</div>
    <div class="balance-wrap">
        <span>💰 ቀሪ</span>
        <span class="balance-amount" id="globalBalance">150.00</span>
    </div>
</div>

<div class="bet-panel">
    <span class="bet-label">🎲 ውርርድ (ETB)</span>
    <div class="bet-quick-buttons">
        <button class="bet-quick" data-bet="5">5</button>
        <button class="bet-quick" data-bet="10">10</button>
        <button class="bet-quick" data-bet="20">20</button>
        <button class="bet-quick" data-bet="50">50</button>
        <button class="bet-quick" data-bet="100">100</button>
    </div>
    <input type="number" id="customBet" class="bet-input" value="5" step="5" min="5" max="100">
</div>

<div class="section-title">🎮 ሁሉም ጨዋታዎች (Crash Games)</div>
<div id="gameGrid" class="games-grid"></div>

<div class="bottom-nav">
    <div class="nav-item" onclick="location.reload()">
        <div class="nav-icon">🎮</div>
        <div>Games</div>
    </div>
    <div class="nav-item" onclick="handleAction('deposit')">
        <div class="nav-icon">📥</div>
        <div>Deposit</div>
    </div>
    <div class="nav-item" onclick="handleAction('withdraw')">
        <div class="nav-icon">💸</div>
        <div>Withdraw</div>
    </div>
    <div class="nav-item" onclick="window.open('https://t.me/Wase_Bet', '_blank')">
        <div class="nav-icon">👥</div>
        <div>Official Group</div>
    </div>
    <div class="nav-item" onclick="window.open('https://t.me/WaseBet12', '_blank')">
        <div class="nav-icon">☎️</div>
        <div>Support</div>
    </div>
</div>

<div id="gameOverlay" class="game-overlay">
    <div class="overlay-card">
        <div class="back-btn" onclick="closeGame()">⬅ ወደ ጨዋታ ዝርዝር</div>
        <div id="gameContent"></div>
    </div>
</div>

<script>
    // ---------- የጨዋታ ምስሎች ማመሳከሪያ (ከጥያቄህ) ----------
    const gameImages = {
        "Aviator": "images/aviator.jpg",
        "Fast Keno": "images/fast-keno.jpg",
        "Mother Clucker": "images/mother-clucker.jpg",
        "Multi Hot 5": "images/multihot5.jpg",
        "Buffalo": "images/buffalo.jpg",
        "Burning Class": "images/burning-class.jpg",
        "Fruity Wilds": "images/fruitywilds.jpg",
        "Safari Simba": "images/safarisimba.jpg",
        "Chicken Road 2": "images/chickenroad2.jpg",
        "Fruit Rush": "images/fruitsrush.jpg",
        "Mine Gems": "images/minegems.jpg",
        "Mines": "images/mines.jpg",
        "Rocket Dice": "images/rocketdice.jpg",
        "Sugar Heaven": "images/sugarheaven.jpg",
        "Aviamasters": "images/aviamasters.jpg",
        "Hot Keno": "images/hotkeno.jpg",
        "Rabbit Road": "images/rabbitroad.jpg",
        "Fish Road": "images/fishroad.jpg",
        "Rocket": "images/rocket.jpg",
        "Chicken Roast": "images/chickenroast.jpg",
        "Bingo": "images/bingo.jpg",
        "Chicken vs Zombies": "images/chickenvszombies.jpg",
        "Insta Keno": "images/instakeno.jpg",
        "Mini Roulette": "images/miniroulette.jpg",
        "Dice": "images/dice.jpg",
        "Cricket Road": "images/cricketroad.jpg",
        "Wheel": "images/wheel.jpg",
        "Chicken Road Gold": "images/chickenroadgold.jpg",
        "Chicken Road Ice": "images/chickenroadice.jpg",
        "Chicken Road Vegas": "images/chickenroadvegas.jpg",
        "Mega Block": "images/megablock.jpg",
        "Penalty Nations": "images/penaltynations.jpg",
        "Classic Keno": "images/classickeno.jpg",
        "Chicken Highway": "images/chickenhighway.jpg",
        "Juicy Fruits": "images/juicyfruits.jpg",
        "Roulette": "images/roulette.jpg"
    };

    // ሁሉንም የጨዋታ ስሞች ከላይ ካለው ዕቃ ማውጣት
    const games = Object.keys(gameImages);

    // አማራጭ: ለማንኛውም ጨዋታ ምስል ባይገኝ የሚታይ ኢሞጂ (fallback)
    function getGameImage(gameName) {
        return gameImages[gameName] || null;
    }

    // ---------- ቀሪ ሂሳብ እና ውርርድ አስተዳደር (መነሻ 150) ----------
    let userBalance = 150.00;
    const balanceSpan = document.getElementById('globalBalance');
    const customBetInput = document.getElementById('customBet');

    function updateBalanceUI() {
        balanceSpan.innerText = userBalance.toFixed(2);
        localStorage.setItem('wasebet_balance', userBalance);
    }

    function loadBalance() {
        let saved = localStorage.getItem('wasebet_balance');
        if (saved !== null && !isNaN(parseFloat(saved))) {
            userBalance = parseFloat(saved);
        } else {
            userBalance = 150.00;
        }
        updateBalanceUI();
    }

    function getCurrentBet() {
        let val = parseFloat(customBetInput.value);
        if (isNaN(val) || val < 5) return 5;
        if (val > 100) return 100;
        return val;
    }

    function setQuickBet(amount) {
        customBetInput.value = amount;
    }

    document.querySelectorAll('.bet-quick').forEach(btn => {
        btn.addEventListener('click', () => {
            setQuickBet(parseInt(btn.dataset.bet));
        });
    });

    function deductBet(amount) {
        if (userBalance < amount) {
            alert(`❌ በቂ ነጥብ የለም! ቀሪ: ${userBalance.toFixed(2)} ETB\nእባክዎ ገንዘብ ያስገቡ (ዝቅተኛ 100 ETB)`);
            return false;
        }
        userBalance -= amount;
        updateBalanceUI();
        return true;
    }

    function addWinnings(amount) {
        userBalance += amount;
        updateBalanceUI();
    }

    function handleAction(type) {
        if (type === 'deposit') {
            alert("📥 ገንዘብ ለማስገባት፦\n📞 ቴሌብር: 0974107425 (Mulualem)\n💵 ዝቅተኛ: 100 ETB\n💵 ከፍተኛ: 10,000 ETB\n\nከላክክ በኋላ ማስረጃ ወደ @WaseBet12 ላክ።");
            window.open('https://t.me/WaseBet12', '_blank');
        } else {
            alert("💸 ገንዘብ ለማውጣት፦\n⚠️ ዝቅተኛ መውጫ: 500 ETB\n\nአስተዳዳሪ @WaseBet12 ያነጋግሩ።");
            window.open('https://t.me/WaseBet12', '_blank');
        }
    }

    // ---------- የCrash Game ሞተር (ለሁሉም ጨዋታዎች ተመሳሳይ) ----------
    let activeGameInterval = null;
    let isGameActive = false;
    let currentMulti = 1.00;
    let currentBetValue = 0;

    function openGame(gameName) {
        const overlay = document.getElementById('gameOverlay');
        const contentDiv = document.getElementById('gameContent');
        overlay.style.display = 'block';
        contentDiv.innerHTML = `
            <h2 style="text-align:center; margin-bottom:10px;">${gameName}</h2>
            <div class="game-viewport">
                <div id="gameMulti" class="multiplier-big">1.00x</div>
                <div class="plane-animation">
                    <div id="movingIcon" class="plane" style="font-size:2.5rem;">✈️</div>
                </div>
                <button id="gameActionBtn" class="action-btn">🚀 SPIN (ውርርድ አስጀምር)</button>
                <div id="gameStatus" class="status-msg">⚡ ውርርድ ለመጀመር SPIN ተጫን</div>
            </div>
        `;
        isGameActive = false;
        if (activeGameInterval) clearInterval(activeGameInterval);
        attachGameEvents(gameName);
    }

    function attachGameEvents(gameName) {
        const actionBtn = document.getElementById('gameActionBtn');
        if (!actionBtn) return;
        actionBtn.onclick = () => {
            if (!isGameActive) {
                let bet = getCurrentBet();
                if (!deductBet(bet)) return;
                currentBetValue = bet;
                isGameActive = true;
                currentMulti = 1.00;
                const multSpan = document.getElementById('gameMulti');
                const statusSpan = document.getElementById('gameStatus');
                const movingIcon = document.getElementById('movingIcon');
                multSpan.innerText = "1.00x";
                statusSpan.innerHTML = `✈️ ${gameName} እየበረረ ነው... ካሽ አውት ተጫን!`;
                actionBtn.innerText = "🛬 ካሽ አውት (CASH OUT)";
                actionBtn.classList.add('cashout-btn');
                if (activeGameInterval) clearInterval(activeGameInterval);
                let leftPos = 0;
                if (movingIcon) movingIcon.style.left = "0px";
                activeGameInterval = setInterval(() => {
                    if (isGameActive) {
                        currentMulti += 0.045;
                        multSpan.innerText = currentMulti.toFixed(2) + "x";
                        if (movingIcon) {
                            leftPos += Math.min(8, 3 + currentMulti * 1.2);
                            if (leftPos > 280) leftPos = 280;
                            movingIcon.style.left = leftPos + "px";
                        }
                        if (Math.random() < 0.09 && currentMulti > 1.2) {
                            clearInterval(activeGameInterval);
                            statusSpan.innerHTML = `💥 ${gameName} ወደቀ! አጣህ ${currentBetValue} ETB`;
                            isGameActive = false;
                            actionBtn.innerText = "🚀 SPIN (ውርርድ አስጀምር)";
                            actionBtn.classList.remove('cashout-btn');
                        }
                    }
                }, 90);
            } else {
                if (activeGameInterval) clearInterval(activeGameInterval);
                let winAmount = Math.floor(currentBetValue * currentMulti);
                addWinnings(winAmount);
                const statusSpan = document.getElementById('gameStatus');
                statusSpan.innerHTML = `🏆 ካሽ አውት! አሸነፍክ ${winAmount} ETB (${currentMulti.toFixed(2)}x) 🎉`;
                isGameActive = false;
                actionBtn.innerText = "🚀 SPIN (ውርርድ አስጀምር)";
                actionBtn.classList.remove('cashout-btn');
            }
        };
    }

    function closeGame() {
        if (activeGameInterval) clearInterval(activeGameInterval);
        document.getElementById('gameOverlay').style.display = 'none';
        isGameActive = false;
    }

    // ---------- ጨዋታዎችን በምስል ማሳየት ----------
    function renderGameGrid() {
        const container = document.getElementById('gameGrid');
        container.innerHTML = '';
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => openGame(game);
            const imgSrc = getGameImage(game);
            card.innerHTML = `
                <div class="game-thumb">
                    ${imgSrc ? `<img src="${imgSrc}" alt="${game}" loading="lazy">` : '<div style="height:100%; display:flex; align-items:center; justify-content:center; font-size:2rem;">🎮</div>'}
                </div>
                <div class="game-info">
                    <div class="game-name">${game}</div>
                    <div class="game-cat">Crash Game</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    loadBalance();
    renderGameGrid();
</script>
</body>
</html>
