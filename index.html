<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wase Bet - ጨዋታዎች</title>
    <style>
        /* CSS ዲዛይን */
        body { background: #0b0b0c; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .top-bar { padding: 20px; text-align: center; font-size: 20px; font-weight: bold; color: #00ffcc; border-bottom: 1px solid #26282e; }
        .games-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .game-card { background: #16171b; border: 1px solid #26282e; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: #00ffcc; }
        .action-btn { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b0c; z-index: 1000; padding: 20px; }
    </style>
</head>
<body>

<div class="top-bar">⚡ WASE BET</div>

<div id="gameGrid" class="games-grid"></div>

<div id="gameOverlay" class="overlay">
    <button onclick="document.getElementById('gameOverlay').style.display='none'" style="background:none; border:none; color:white; font-size:20px;">⬅ ተመለስ</button>
    <div id="gameContent" style="margin-top:20px; text-align:center;"></div>
</div>

<script>
    // የጨዋታዎች ዝርዝር
    const games = [
        { name: "Aviator", cat: "Crash Game" },
        { name: "Chicken Road 2", cat: "Crash Game" },
        { name: "Mine Gems", cat: "Casino" },
        { name: "Mini Roulette", cat: "Casino" },
        { name: "Fast Keno", cat: "Casino" },
        { name: "Chicken Road Gold", cat: "Crash Game" }
    ];

    // ካርዶችን መፍጠር
    function renderGames() {
        const grid = document.getElementById('gameGrid');
        games.forEach(game => {
            const div = document.createElement('div');
            div.className = 'game-card';
            div.onclick = () => openGame(game.name);
            div.innerHTML = `<h3>${game.name}</h3><p style="color:#aaa; font-size:12px;">${game.cat}</p>`;
            grid.appendChild(div);
        });
    }

    // ጨዋታ መክፈት
    function openGame(name) {
        document.getElementById('gameOverlay').style.display = 'block';
        document.getElementById('gameContent').innerHTML = `
            <h2>${name} እየተጫኑ ነው...</h2>
            <div style="height:200px; display:flex; align-items:center; justify-content:center; background:#16171b; border-radius:15px; margin:20px 0;">
                ጨዋታው እዚህ ይታያል
            </div>
            <button class="action-btn">ውርርድ ያድርጉ</button>
        `;
    }

    renderGames();
</script>

</body>
</html>
