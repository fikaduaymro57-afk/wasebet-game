<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SQUID GAME - WASE BET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0a0c 0%, #1a0a0a 100%);
            color: white;
            padding-bottom: 80px;
        }
        /* Header */
        .top-bar {
            background: #0f0f12;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff3366;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ff3366;
        }
        .balance-wrap {
            background: #1a1c22;
            padding: 5px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #ff3366;
        }
        .balance-amount {
            font-weight: bold;
            font-size: 1rem;
            color: #00ffcc;
        }
        /* Bet Panel */
        .bet-panel {
            background: #0f0f12;
            margin: 12px;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #ff3366;
        }
        .bet-quick {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .bet-quick button {
            background: #1f2128;
            border: none;
            color: #ffcc00;
            padding: 6px 14px;
            border-radius: 25px;
            cursor: pointer;
        }
        .bet-input {
            background: #1a1c22;
            border: 1px solid #ff3366;
            color: #ffcc00;
            padding: 8px 12px;
            border-radius: 25px;
            width: 100px;
            text-align: center;
        }
        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 12px;
            margin: 20px 0;
        }
        @media (max-width: 550px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .game-card {
            background: linear-gradient(145deg, #1a0a0a, #0a0a0c);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #ff3366;
            text-align: center;
            padding: 15px 8px;
        }
        .game-card:hover {
            transform: translateY(-4px);
            border-color: #ffcc00;
            box-shadow: 0 0 15px rgba(255,51,102,0.3);
        }
        .game-icon {
            font-size: 3rem;
            margin-bottom: 8px;
        }
        .game-name {
            font-size: 14px;
            font-weight: 700;
        }
        .game-badge {
            font-size: 10px;
            color: #ff3366;
            margin-top: 5px;
        }
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0f0f12;
            border-top: 1px solid #ff3366;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 20;
        }
        .nav-item {
            text-align: center;
            color: #aaa;
            font-size: 0.65rem;
            cursor: pointer;
        }
        .nav-icon {
            font-size: 1.2rem;
            margin-bottom: 3px;
        }
        /* Game Overlay */
        .game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,10,15,0.98);
            backdrop-filter: blur(8px);
            z-index: 200;
            overflow-y: auto;
            padding: 20px;
        }
        .overlay-card {
            background: #121316;
            border-radius: 28px;
            border: 1px solid #ff3366;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }
        .back-btn {
            background: #1f2128;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
            color: #ffcc00;
        }
        .action-btn {
            background: #ff3366;
            border: none;
            width: 100%;
            padding: 14px;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 15px;
            cursor: pointer;
            color: white;
            font-size: 1rem;
        }
        .result {
            text-align: center;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        /* Red Light Green Light */
        .light-box {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            transition: 0.3s;
        }
        .red { background: #ff0000; box-shadow: 0 0 30px red; }
        .green { background: #00ff00; box-shadow: 0 0 30px green; }
        /* Dalgona */
        .shape-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .shape-btn {
            background: #1f2128;
            padding: 20px;
            text-align: center;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1.5rem;
            border: 1px solid #ff3366;
        }
        /* Glass Bridge */
        .bridge-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .glass {
            background: #1a1c22;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #00ffcc;
        }
        /* Marbles */
        .marbles-area {
            text-align: center;
            padding: 20px;
        }
        .marble-btn {
            background: #1f2128;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-block;
            border: 1px solid #ffcc00;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">🦑 SQUID GAME | WASE BET</div>
    <div class="balance-wrap">
        <span>💰 ቀሪ</span>
        <span class="balance-amount" id="globalBalance">500.00</span>
    </div>
</div>

<div class="bet-panel">
    <div class="bet-quick">
        <button onclick="setBet(10)">10</button>
        <button onclick="setBet(50)">50</button>
        <button onclick="setBet(100)">100</button>
        <button onclick="setBet(200)">200</button>
        <button onclick="setBet(500)">500</button>
    </div>
    <input type="number" id="customBet" class="bet-input" value="50" min="10" max="1000">
</div>

<div class="games-grid">
    <div class="game-card" onclick="openGame('redlight')">
        <div class="game-icon">🔴🟢</div>
        <div class="game-name">RED LIGHT, GREEN LIGHT</div>
        <div class="game-badge">Squid Game</div>
    </div>
    <div class="game-card" onclick="openGame('dalgona')">
        <div class="game-icon">🍯</div>
        <div class="game-name">DALGONA (Honeycomb)</div>
        <div class="game-badge">Squid Game</div>
    </div>
    <div class="game-card" onclick="openGame('tugofwar')">
        <div class="game-icon">🪢</div>
        <div class="game-name">TUG OF WAR</div>
        <div class="game-badge">Squid Game</div>
    </div>
    <div class="game-card" onclick="openGame('marbles')">
        <div class="game-icon">🎲</div>
        <div class="game-name">MARBLES</div>
        <div class="game-badge">Squid Game</div>
    </div>
    <div class="game-card" onclick="openGame('glassbridge')">
        <div class="game-icon">🪟</div>
        <div class="game-name">GLASS BRIDGE</div>
        <div class="game-badge">Squid Game</div>
    </div>
    <div class="game-card" onclick="openGame('squid')">
        <div class="game-icon">🦑</div>
        <div class="game-name">SQUID GAME</div>
        <div class="game-badge">Final Game</div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="location.reload()"><div class="nav-icon">🎮</div><div>Games</div></div>
    <div class="nav-item" onclick="handleAction('deposit')"><div class="nav-icon">📥</div><div>Deposit</div></div>
    <div class="nav-item" onclick="handleAction('withdraw')"><div class="nav-icon">💸</div><div>Withdraw</div></div>
    <div class="nav-item" onclick="window.open('https://t.me/Wase_Bet', '_blank')"><div class="nav-icon">👥</div><div>Group</div></div>
    <div class="nav-item" onclick="window.open('https://t.me/WaseBet12', '_blank')"><div class="nav-icon">☎️</div><div>Support</div></div>
</div>

<div id="gameOverlay" class="game-overlay">
    <div class="overlay-card">
        <div class="back-btn" onclick="closeGame()">⬅ ወደ ጨዋታ ዝርዝር</div>
        <div id="gameContent"></div>
    </div>
</div>

<script>
    // ========== Balance Management ==========
    let userBalance = 500;
    const balanceSpan = document.getElementById('globalBalance');
    const betInput = document.getElementById('customBet');

    function updateBalance() {
        balanceSpan.innerText = userBalance.toFixed(2);
        localStorage.setItem('squid_balance', userBalance);
    }

    function loadBalance() {
        let saved = localStorage.getItem('squid_balance');
        if (saved && !isNaN(parseFloat(saved))) userBalance = parseFloat(saved);
        updateBalance();
    }

    function getBet() {
        let val = parseFloat(betInput.value);
        if (isNaN(val) || val < 10) return 50;
        if (val > 1000) return 1000;
        return val;
    }

    function setBet(amount) {
        betInput.value = amount;
    }

    function deductBet(amount) {
        if (userBalance < amount) {
            alert("❌ በቂ ነጥብ የለም! ቀሪ: " + userBalance + " ETB");
            return false;
        }
        userBalance -= amount;
        updateBalance();
        return true;
    }

    function addWin(amount) {
        userBalance += amount;
        updateBalance();
    }

    function handleAction(type) {
        if (type === 'deposit') {
            alert("📥 ገንዘብ ለማስገባት:\n📞 ቴሌብር: 0906679137\n👤 Degarege Teshome\n💵 ዝቅተኛ: 100 ETB");
        } else {
            alert("💸 መውጫ 200 ETB ነው። አስተዳዳሪ @WaseBet12 ያነጋግሩ");
        }
    }

    // ========== RED LIGHT, GREEN LIGHT ==========
    let rlglInterval = null;
    let rlglActive = true;
    
    function showRedLight() {
        document.getElementById('gameContent').innerHTML = `
            <h2 style="text-align:center;">🔴🟢 RED LIGHT, GREEN LIGHT</h2>
            <div id="lightBox" class="light-box green">🟢 GO!</div>
            <button id="moveBtn" class="action-btn">🏃 MOVE!</button>
            <div id="gameResult" class="result"></div>
        `;
        
        let bet = getBet();
        if (!deductBet(bet)) {
            closeGame();
            return;
        }
        
        let lightState = "green";
        let moveCount = 0;
        let gameRunning = true;
        
        const lightBox = document.getElementById('lightBox');
        const moveBtn = document.getElementById('moveBtn');
        const resultDiv = document.getElementById('gameResult');
        
        // ብርሃን መቀየሪያ
        let interval = setInterval(() => {
            if (!gameRunning) return;
            if (lightState === "green") {
                lightState = "red";
                lightBox.className = "light-box red";
                lightBox.innerHTML = "🔴 STOP!";
            } else {
                lightState = "green";
                lightBox.className = "light-box green";
                lightBox.innerHTML = "🟢 GO!";
            }
        }, randomTime(800, 2000));
        
        moveBtn.onclick = () => {
            if (!gameRunning) return;
            if (lightState === "red") {
                gameRunning = false;
                clearInterval(interval);
                resultDiv.innerHTML = "💀 ተይዘሃል! አጣህ " + bet + " ETB 💀";
                setTimeout(() => closeGame(), 2000);
            } else {
                moveCount++;
                if (moveCount >= 5) {
                    gameRunning = false;
                    clearInterval(interval);
                    let win = bet * 2;
                    addWin(win);
                    resultDiv.innerHTML = "🏆 አሸነፍክ! +" + win + " ETB 🏆";
                    setTimeout(() => closeGame(), 2000);
                }
            }
        };
    }

    // ========== DALGONA (HONEYCOMB) ==========
    function showDalgona() {
        document.getElementById('gameContent').innerHTML = `
            <h2 style="text-align:center;">🍯 DALGONA (Honeycomb)</h2>
            <p style="text-align:center;">ቅርጹን በጥንቃቄ ውጣ!</p>
            <div class="shape-grid">
                <div class="shape-btn" data-shape="circle">⬤ CIRCLE</div>
                <div class="shape-btn" data-shape="triangle">▲ TRIANGLE</div>
                <div class="shape-btn" data-shape="star">★ STAR</div>
                <div class="shape-btn" data-shape="umbrella">☂️ UMBRELLA</div>
            </div>
            <div id="dalgonaResult" class="result"></div>
        `;
        
        let bet = getBet();
        if (!deductBet(bet)) {
            closeGame();
            return;
        }
        
        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.onclick = () => {
                let shape = btn.dataset.shape;
                let success = Math.random() > 0.4;
                
                if (success) {
                    let win = bet * 2.5;
                    addWin(win);
                    document.getElementById('dalgonaResult').innerHTML = "🎉 ቅርጹን በተሳካ ሁኔታ አወጣህ! +" + win + " ETB 🎉";
                } else {
                    document.getElementById('dalgonaResult').innerHTML = "💥 ቅርጹ ተሰበረ! አጣህ " + bet + " ETB 💥";
                }
                setTimeout(() => closeGame(), 2000);
            };
        });
    }

    // ========== TUG OF WAR ==========
    function showTugOfWar() {
        document.getElementById('gameContent').innerHTML = `
            <h2 style="text-align:center;">🪢 TUG OF WAR</h2>
            <div style="text-align:center; margin:20px 0;">
                <div style="font-size:2rem;">🤝 VS 🤝</div>
                <div style="width:100%; height:20px; background:#333; margin:20px 0; border-radius:10px;">
                    <div id="tugBar" style="width:50%; height:100%; background:#ff3366; border-radius:10px;"></div>
                </div>
            </div>
            <button id="pullBtn" class="action-btn">💪 PULL!</button>
            <div id="tugResult" class="result"></div>
        `;
        
        let bet = getBet();
        if (!deductBet(bet)) {
            closeGame();
            return;
        }
        
        let position = 50;
        let tugBar = document.getElementById('tugBar');
        let pullBtn = document.getElementById('pullBtn');
        let resultDiv = document.getElementById('tugResult');
        
        pullBtn.onclick = () => {
            let power = Math.random() * 30;
            position += power;
            if (position > 90) {
                resultDiv.innerHTML = "🏆 አሸነፍክ! +" + (bet * 2) + " ETB 🏆";
                addWin(bet * 2);
                setTimeout(() => closeGame(), 2000);
            } else {
                tugBar.style.width = position + "%";
                if (Math.random() < 0.2) {
                    resultDiv.innerHTML = "💥 ተሸነፍክ! አጣህ " + bet + " ETB 💥";
                    setTimeout(() => closeGame(), 2000);
                }
            }
        };
    }

    // ========== MARBLES ==========
    function showMarbles() {
        document.getElementById('gameContent').innerHTML = `
            <h2 style="text-align:center;">🎲 MARBLES</h2>
            <div class="marbles-area">
                <p>እንኳን ወይስ ጎዶሎ? (Even or Odd?)</p>
                <div class="marble-btn" data-guess="even">✅ EVEN (እንኳን)</div>
                <div class="marble-btn" data-guess="odd">❌ ODD (ጎዶሎ)</div>
            </div>
            <div id="marbleResult" class="result"></div>
        `;
        
        let bet = getBet();
        if (!deductBet(bet)) {
            closeGame();
            return;
        }
        
        let number = Math.floor(Math.random() * 10) + 1;
        
        document.querySelectorAll('.marble-btn').forEach(btn => {
            btn.onclick = () => {
                let guess = btn.dataset.guess;
                let isEven = number % 2 === 0;
                
                if ((guess === "even" && isEven) || (guess === "odd" && !isEven)) {
                    let win = bet * 2;
                    addWin(win);
                    document.getElementById('marbleResult').innerHTML = "🎉 ቁጥሩ " + number + " ነበር! +" + win + " ETB 🎉";
                } else {
                    document.getElementById('marbleResult').innerHTML = "💥 ቁጥሩ " + number + " ነበር! አጣህ " + bet + " ETB 💥";
                }
                setTimeout(() => closeGame(), 2000);
            };
        });
    }

    // ========== GLASS BRIDGE ==========
    function showGlassBridge() {
        document.getElementById('gameContent').innerHTML = `
            <h2 style="text-align:center;">🪟 GLASS BRIDGE</h2>
            <p style="text-align:center;">ትክክለኛውን መስታዊት ምረጥ!</p>
            <div class="bridge-grid" id="bridgeGrid"></div>
            <div id="bridgeResult" class="result"></div>
        `;
        
        let bet = getBet();
        if (!deductBet(bet)) {
            closeGame();
            return;
        }
        
        let correct = Math.floor(Math.random() * 4);
        let grid = document.getElementById('bridgeGrid');
        
        for (let i = 0; i < 4; i++) {
            let glass = document.createElement('div');
            glass.className = 'glass';
            glass.innerHTML = '🪟';
            glass.onclick = () => {
                if (i === correct) {
                    let win = bet * 2.5;
                    addWin(win);
                    document.getElementById('bridgeResult').innerHTML = "🎉 ደህና ደረስክ! +" + win + " ETB 🎉";
                } else {
                    document.getElementById('bridgeResult').innerHTML = "💥 መስታዊቱ ተሰበረ! አጣህ " + bet + " ETB 💥";
                }
                setTimeout(() => closeGame(), 2000);
            };
            grid.appendChild(glass);
        }
    }

    // ========== SQUID GAME FINAL ==========
    function showSquidGame() {
        document.getElementById('gameContent').innerHTML = `
            <h2 style="text-align:center;">🦑 SQUID GAME - FINAL</h2>
            <p style="text-align:center;">ጭንቅላት ወይስ ጭራ? (Head or Tail?)</p>
            <div class="marbles-area">
                <div class="marble-btn" data-side="head">🦑 HEAD (ጭንቅላት)</div>
                <div class="marble-btn" data-side="tail">🐙 TAIL (ጭራ)</div>
            </div>
            <div id="squidResult" class="result"></div>
        `;
        
        let bet = getBet();
        if (!deductBet(bet)) {
            closeGame();
            return;
        }
        
        let result = Math.random() > 0.5 ? "head" : "tail";
        
        document.querySelectorAll('.marble-btn').forEach(btn => {
            btn.onclick = () => {
                let guess = btn.dataset.side;
                if (guess === result) {
                    let win = bet * 3;
                    addWin(win);
                    document.getElementById('squidResult').innerHTML = "🏆 አሸነፍክ! የ SQUID GAME ሻምፒዮን ሆነህ! +" + win + " ETB 🏆";
                } else {
                    document.getElementById('squidResult').innerHTML = "💀 ተሸነፍክ! አጣህ " + bet + " ETB 💀";
                }
                setTimeout(() => closeGame(), 2000);
            };
        });
    }

    function randomTime(min, max) {
        return Math.random() * (max - min) + min;
    }

    function openGame(game) {
        document.getElementById('gameOverlay').style.display = 'block';
        if (game === 'redlight') showRedLight();
        else if (game === 'dalgona') showDalgona();
        else if (game === 'tugofwar') showTugOfWar();
        else if (game === 'marbles') showMarbles();
        else if (game === 'glassbridge') showGlassBridge();
        else if (game === 'squid') showSquidGame();
    }
    
    function closeGame() {
        if (rlglInterval) clearInterval(rlglInterval);
        document.getElementById('gameOverlay').style.display = 'none';
    }

    loadBalance();
</script>
</body>
</html>
