<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wase Bet – ዘመናዊ የቁማር ጣቢያ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
        }
        body {
            background: #0a0a0c;
            color: white;
            padding-bottom: 80px;
        }
        /* Header */
        .top-bar {
            background: #121316;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2026;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ffcc00;
        }
        .balance-wrap {
            background: #1a1c22;
            padding: 6px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #2a2c34;
        }
        .balance-amount {
            font-weight: bold;
            font-size: 1.1rem;
            color: #00ffcc;
        }
        /* Bet Panel like UFC style */
        .bet-panel {
            background: #121316;
            margin: 16px;
            padding: 16px;
            border-radius: 20px;
            border: 1px solid #1f2026;
        }
        .bet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .bet-label {
            color: #aaa;
            font-size: 0.85rem;
        }
        .auto-badge {
            background: #2a2c34;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #ffcc00;
        }
        .bet-quick-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .bet-quick {
            background: #1f2128;
            border: none;
            color: #ffcc00;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            min-width: 55px;
        }
        .bet-quick.active {
            background: #ffcc00;
            color: black;
        }
        .bet-input {
            background: #1a1c22;
            border: 1px solid #2a2c34;
            color: #ffcc00;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 30px;
            width: 100px;
            text-align: center;
        }
        .section-title {
            padding: 0 16px;
            margin: 20px 0 12px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Game Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 16px;
        }
        @media (max-width: 550px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .game-card {
            background: #121316;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #1f2026;
        }
        .game-card:hover {
            transform: translateY(-3px);
            border-color: #ffcc00;
        }
        .game-thumb {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: #1a1c22;
        }
        .game-info {
            padding: 8px;
            text-align: center;
        }
        .game-name {
            font-size: 12px;
            font-weight: 600;
        }
        .game-cat {
            font-size: 10px;
            color: #888;
            margin-top: 3px;
        }
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #121316;
            border-top: 1px solid #1f2026;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 12px;
            z-index: 20;
        }
        .nav-item {
            text-align: center;
            color: #aaa;
            font-size: 0.7rem;
            cursor: pointer;
            flex: 1;
        }
        .nav-icon {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }
        /* Game Overlay */
        .game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,10,12,0.98);
            backdrop-filter: blur(8px);
            z-index: 200;
            overflow-y: auto;
            padding: 20px 16px;
        }
        .overlay-card {
            background: #121316;
            border-radius: 28px;
            border: 1px solid #2a2c34;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1f2128;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            color: #ffcc00;
        }
        .action-btn {
            background: #ffcc00;
            border: none;
            width: 100%;
            padding: 14px;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 1rem;
            color: black;
        }
        .cashout-btn {
            background: #2e7d32;
            color: white;
        }
        .multiplier-big {
            font-size: 2.8rem;
            font-weight: bold;
            color: #ff3366;
            margin: 15px 0;
            text-align: center;
        }
        .status-msg {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #ffaa66;
            text-align: center;
        }
        /* Chicken Road specific */
        .road-container {
            position: relative;
            height: 180px;
            background: #1a1c22;
            border-radius: 16px;
            overflow: hidden;
            margin: 15px 0;
            border: 1px solid #2a2c34;
        }
        .chicken-char {
            position: absolute;
            left: 20px;
            bottom: 10px;
            font-size: 3rem;
            transition: left 0.05s linear;
        }
        .truck-char {
            position: absolute;
            right: -80px;
            bottom: 10px;
            font-size: 3.2rem;
            transition: right 0.05s linear;
        }
        .bet-presets {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
        }
        .preset-btn {
            background: #1f2128;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: #ffcc00;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">⚡ WASE BET</div>
    <div class="balance-wrap">
        <span>💰 ቀሪ</span>
        <span class="balance-amount" id="globalBalance">150.00</span>
    </div>
</div>

<!-- Bet Panel UFC Style -->
<div class="bet-panel">
    <div class="bet-row">
        <span class="bet-label">Bet</span>
        <span class="auto-badge">Auto</span>
    </div>
    <div class="bet-quick-buttons">
        <button class="bet-quick" data-bet="4">4</button>
        <button class="bet-quick" data-bet="10">10</button>
        <button class="bet-quick" data-bet="40">40</button>
        <button class="bet-quick" data-bet="100">100</button>
    </div>
    <div class="bet-row">
        <span class="bet-label">Bet</span>
        <input type="number" id="customBet" class="bet-input" value="10" step="1" min="4" max="500">
        <span>ETB</span>
    </div>
</div>

<div class="section-title">🎮 ታዋቂ ጨዋታዎች</div>
<div id="gameGrid" class="games-grid"></div>

<div class="bottom-nav">
    <div class="nav-item" onclick="location.reload()"><div class="nav-icon">🎮</div><div>Games</div></div>
    <div class="nav-item" onclick="handleAction('deposit')"><div class="nav-icon">📥</div><div>Deposit</div></div>
    <div class="nav-item" onclick="handleAction('withdraw')"><div class="nav-icon">💸</div><div>Withdraw</div></div>
    <div class="nav-item" onclick="window.open('https://t.me/Wase_Bet', '_blank')"><div class="nav-icon">👥</div><div>Group</div></div>
    <div class="nav-item" onclick="window.open('https://t.me/WaseBet12', '_blank')"><div class="nav-icon">☎️</div><div>Support</div></div>
</div>

<div id="gameOverlay" class="game-overlay">
    <div class="overlay-card">
        <div class="back-btn" onclick="closeGame()">⬅ ወደ ጨዋታ ዝርዝር</div>
        <div id="gameContent"></div>
    </div>
</div>

<script>
    // ---------- የጨዋታ ዝርዝር ----------
    const games = [
        "Aviator", "Fast Keno", "Mother Clucker", "Multi Hot 5", "Buffalo",
        "Burning Class", "Fruity Wilds", "Safari Simba", "Chicken Road", "Fruit Rush",
        "Mine Gems", "Mines", "Rocket Dice", "Sugar Heaven", "Aviamasters",
        "Hot Keno", "Rabbit Road", "Fish Road", "Rocket", "Chicken Roast",
        "Bingo", "Chicken vs Zombies", "Insta Keno", "Mini Roulette", "Dice",
        "Cricket Road", "Wheel", "Mega Block", "Penalty Nations"
    ];

    function getEmoji(name) {
        const n = name.toLowerCase();
        if (n.includes('aviator')) return '✈️';
        if (n.includes('chicken')) return '🐔';
        if (n.includes('wheel')) return '🎡';
        if (n.includes('keno')) return '🎰';
        if (n.includes('dice')) return '🎲';
        return '🎮';
    }

    // ---------- ቀሪ ሂሳብ እና ውርርድ አስተዳደር ----------
    let userBalance = 150.00;
    const balanceSpan = document.getElementById('globalBalance');
    const customBetInput = document.getElementById('customBet');

    function updateBalanceUI() {
        balanceSpan.innerText = userBalance.toFixed(2);
        localStorage.setItem('wasebet_balance', userBalance);
    }

    function loadBalance() {
        let saved = localStorage.getItem('wasebet_balance');
        userBalance = (saved !== null && !isNaN(parseFloat(saved))) ? parseFloat(saved) : 150.00;
        updateBalanceUI();
    }

    function getCurrentBet() {
        let val = parseFloat(customBetInput.value);
        if (isNaN(val) || val < 4) return 10;
        if (val > 500) return 500;
        return val;
    }

    document.querySelectorAll('.bet-quick').forEach(btn => {
        btn.addEventListener('click', () => {
            customBetInput.value = parseInt(btn.dataset.bet);
            document.querySelectorAll('.bet-quick').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    function deductBet(amount) {
        if (userBalance < amount) {
            alert(`❌ በቂ ነጥብ የለም! ቀሪ: ${userBalance.toFixed(2)} ETB`);
            return false;
        }
        userBalance -= amount;
        updateBalanceUI();
        return true;
    }

    function addWinnings(amount) {
        userBalance += amount;
        updateBalanceUI();
    }

    function handleAction(type) {
        if (type === 'deposit') {
            alert("📥 ገንዘብ ለማስገባት፦\n📞 ቴሌብር: 0974107425 (Mulualem)\n💵 ዝቅተኛ: 100 ETB\n💵 ከፍተኛ: 10,000 ETB\n\nከላክክ በኋላ ማስረጃ ወደ @WaseBet12 ላክ።");
            window.open('https://t.me/WaseBet12', '_blank');
        } else {
            alert("💸 ገንዘብ ለማውጣት፦\n⚠️ ዝቅተኛ መውጫ: 500 ETB\n\nአስተዳዳሪ @WaseBet12 ያነጋግሩ።");
            window.open('https://t.me/WaseBet12', '_blank');
        }
    }

    // ========== ጨዋታዎች ክስተቶች ==========
    let activeGameInterval = null;
    let isGameActive = false;
    let currentMulti = 1.00;
    let currentBetValue = 0;
    let chickenInterval = null;

    function openGame(gameName) {
        const overlay = document.getElementById('gameOverlay');
        const contentDiv = document.getElementById('gameContent');
        overlay.style.display = 'block';
        if (activeGameInterval) clearInterval(activeGameInterval);
        if (chickenInterval) clearInterval(chickenInterval);
        isGameActive = false;

        // Chicken Road (የተሻሻለ እንደ ምስሉ)
        if (gameName === "Chicken Road" || gameName.toLowerCase().includes("chicken")) {
            contentDiv.innerHTML = `
                <div style="text-align:center;">
                    <h2>🐔 CHICKEN ROAD</h2>
                    <div class="road-container">
                        <div id="chickenChar" class="chicken-char">🐔</div>
                        <div id="truckChar" class="truck-char">🚚</div>
                    </div>
                    <div class="bet-presets">
                        <button class="preset-btn" data-preset="4">4 ETB</button>
                        <button class="preset-btn" data-preset="8">8 ETB</button>
                        <button class="preset-btn" data-preset="12">12 ETB</button>
                        <button class="preset-btn" data-preset="20">20 ETB</button>
                    </div>
                    <button id="gameActionBtn" class="action-btn">🏁 Play</button>
                    <div id="gameStatus" class="status-msg">⚡ ለመጫወት Play ተጫን</div>
                </div>
            `;
            // ፈጣን ውርርድ ቁልፎች
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.onclick = () => {
                    customBetInput.value = parseInt(btn.dataset.preset);
                };
            });
            attachChickenEvents();
        }
        // Aviator
        else if (gameName === "Aviator") {
            contentDiv.innerHTML = `
                <h2 style="text-align:center;">✈️ AVIATOR</h2>
                <div class="multiplier-big" id="gameMulti">1.00x</div>
                <button id="gameActionBtn" class="action-btn">🚀 SPIN</button>
                <div id="gameStatus" class="status-msg">⚡ ዝግጁ</div>
            `;
            attachCrashEvents(gameName);
        }
        // Wheel
        else if (gameName === "Wheel") {
            contentDiv.innerHTML = `
                <h2 style="text-align:center;">🎡 LUCKY WHEEL</h2>
                <div id="wheel" style="width:200px; height:200px; margin:20px auto; border-radius:50%; background:conic-gradient(red 0deg 45deg, blue 45deg 90deg, green 90deg 135deg, yellow 135deg 180deg, purple 180deg 225deg, orange 225deg 270deg, cyan 270deg 315deg, pink 315deg 360deg); transition:transform 4s ease-out;"></div>
                <button id="wheelBtn" class="action-btn">🎲 SPIN</button>
                <div id="gameStatus" class="status-msg">⚡ ዊሉን አሽከርክር</div>
            `;
            document.getElementById("wheelBtn").onclick = () => {
                let bet = getCurrentBet();
                if (!deductBet(bet)) return;
                const wheel = document.getElementById("wheel");
                const deg = 3600 + Math.random() * 1000;
                wheel.style.transform = `rotate(${deg}deg)`;
                setTimeout(() => {
                    const stopDeg = deg % 360;
                    let multiplier = 1.0;
                    if (stopDeg < 45) multiplier = 2.0;
                    else if (stopDeg < 90) multiplier = 1.5;
                    else if (stopDeg < 135) multiplier = 0;
                    else if (stopDeg < 180) multiplier = 3.0;
                    else if (stopDeg < 225) multiplier = 1.2;
                    else if (stopDeg < 270) multiplier = 0;
                    else if (stopDeg < 315) multiplier = 4.0;
                    else multiplier = 2.5;
                    if (multiplier > 0) {
                        let win = Math.floor(bet * multiplier);
                        addWinnings(win);
                        document.getElementById("gameStatus").innerHTML = `🎉 አሸነፍክ! ${multiplier}x → ${win} ETB`;
                    } else {
                        document.getElementById("gameStatus").innerHTML = `💥 ተሸነፍክ! አጣህ ${bet} ETB`;
                    }
                    setTimeout(() => closeGame(), 2000);
                }, 4000);
            };
        }
        // ሌሎች ጨዋታዎች (Crash Game)
        else {
            contentDiv.innerHTML = `
                <h2 style="text-align:center;">${getEmoji(gameName)} ${gameName}</h2>
                <div class="multiplier-big" id="gameMulti">1.00x</div>
                <button id="gameActionBtn" class="action-btn">🚀 SPIN</button>
                <div id="gameStatus" class="status-msg">⚡ ዝግጁ</div>
            `;
            attachCrashEvents(gameName);
        }
    }

    function attachCrashEvents(gameName) {
        const actionBtn = document.getElementById('gameActionBtn');
        if (!actionBtn) return;
        actionBtn.onclick = () => {
            if (!isGameActive) {
                let bet = getCurrentBet();
                if (!deductBet(bet)) return;
                currentBetValue = bet;
                isGameActive = true;
                currentMulti = 1.00;
                const multSpan = document.getElementById('gameMulti');
                const statusSpan = document.getElementById('gameStatus');
                multSpan.innerText = "1.00x";
                statusSpan.innerHTML = `🎲 ${gameName} እየበረረ ነው...`;
                actionBtn.innerText = "🛬 ካሽ አውት";
                actionBtn.classList.add('cashout-btn');
                if (activeGameInterval) clearInterval(activeGameInterval);
                activeGameInterval = setInterval(() => {
                    if (isGameActive) {
                        currentMulti += 0.045;
                        multSpan.innerText = currentMulti.toFixed(2) + "x";
                        if (Math.random() < 0.09 && currentMulti > 1.2) {
                            clearInterval(activeGameInterval);
                            statusSpan.innerHTML = `💥 ${gameName} ወደቀ! አጣህ ${currentBetValue} ETB`;
                            isGameActive = false;
                            actionBtn.innerText = "🚀 SPIN";
                            actionBtn.classList.remove('cashout-btn');
                        }
                    }
                }, 90);
            } else {
                if (activeGameInterval) clearInterval(activeGameInterval);
                let win = Math.floor(currentBetValue * currentMulti);
                addWinnings(win);
                document.getElementById('gameStatus').innerHTML = `🏆 ካሽ አውት! አሸነፍክ ${win} ETB (${currentMulti.toFixed(2)}x) 🎉`;
                isGameActive = false;
                actionBtn.innerText = "🚀 SPIN";
                actionBtn.classList.remove('cashout-btn');
            }
        };
    }

    function attachChickenEvents() {
        const actionBtn = document.getElementById('gameActionBtn');
        if (!actionBtn) return;
        actionBtn.onclick = () => {
            if (chickenInterval) return;
            let bet = getCurrentBet();
            if (!deductBet(bet)) return;
            const chickenDiv = document.getElementById('chickenChar');
            const truckDiv = document.getElementById('truckChar');
            if (!chickenDiv || !truckDiv) return;
            let chickenX = 20;
            let truckX = 320;
            chickenDiv.style.left = chickenX + "px";
            truckDiv.style.right = "-80px";
            document.getElementById('gameStatus').innerHTML = "🐔 እየሮጠች ነው...";
            chickenInterval = setInterval(() => {
                chickenX += 7;
                truckX -= 8;
                chickenDiv.style.left = chickenX + "px";
                truckDiv.style.right = (window.innerWidth - truckX) + "px";
                if (chickenX >= 280) {
                    clearInterval(chickenInterval);
                    const win = Math.floor(bet * 2.2);
                    addWinnings(win);
                    document.getElementById('gameStatus').innerHTML = `🎉 ዶሮዋ ደረሰች! አሸነፍክ ${win} ETB!`;
                    setTimeout(() => closeGame(), 2000);
                } else if (Math.abs(chickenX - (340 - truckX)) < 45 && truckX > 100) {
                    clearInterval(chickenInterval);
                    document.getElementById('gameStatus').innerHTML = `💥 መኪና መታች! አጣህ ${bet} ETB.`;
                    setTimeout(() => closeGame(), 2000);
                }
            }, 55);
        };
    }

    function closeGame() {
        if (activeGameInterval) clearInterval(activeGameInterval);
        if (chickenInterval) clearInterval(chickenInterval);
        document.getElementById('gameOverlay').style.display = 'none';
        isGameActive = false;
    }

    function renderGameGrid() {
        const container = document.getElementById('gameGrid');
        container.innerHTML = '';
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => openGame(game);
            card.innerHTML = `
                <div class="game-thumb">${getEmoji(game)}</div>
                <div class="game-info">
                    <div class="game-name">${game}</div>
                    <div class="game-cat">Crash Game</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    loadBalance();
    renderGameGrid();
</script>
</body>
</html>
